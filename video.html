    <style>
.container {
            width: min(1200px, 94vw);
            margin: 28px auto 34px;
            display: grid;
            gap: 24px;

        .header {
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            text-align: center;
            padding: clamp(24px, 4vw, 40px);
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header h1 {
            font-family: var(--font-serif);
            font-size: clamp(32px, 4.4vw, 50px);
            margin-bottom: 0;
            color: #c5b358;
            letter-spacing: 0.8px;
        }

        .header p {
            color: var(--ink-soft);
            font-size: clamp(14px, 1.8vw, 18px);
            line-height: 1.8;
            max-width: 800px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .video-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: rgba(var(--primary-rgb), 0.4);
            box-shadow: 0 30px 60px rgba(28, 39, 50, 0.18);
        }

        .card-banner {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #fff;
            position: relative;
        }

        .bilibili-banner {
            background: linear-gradient(135deg, #00aeec, #0076a3);
        }

        .douyin-banner {
            background: linear-gradient(135deg, #1c0b1b, #000000);
        }

        .youtube-banner {
            background: linear-gradient(135deg, #ff0000, #b91d1d);
        }

        .card-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: #c5b358;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-desc {
            font-size: 15px;
            color: var(--ink-soft);
            line-height: 1.6;
        }

        .card-action {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            color: #c5b358;
            font-size: 14px;
        }@media (max-width: 760px) {
.header {
                height: auto;
                min-height: 220px;
            }

            .video-grid {
                grid-template-columns: 1fr;
            }
}

        /* --- Dark Theme --- */
        [data-theme='dark'] {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #000000;
            --gold: #c5b358;
            --ink: #FFFFFF;
            --ink-soft: #A0B3C6;
            --paper: #000000;
            --surface: rgba(0, 78, 140, 0.08);
            --line: rgba(0, 78, 140, 0.4);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        [data-theme='dark'] body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 1000;
        }

        [data-theme='dark'] .header,
        [data-theme='dark'] .video-card {
            background: var(--surface) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid var(--line) !important;
            box-shadow: var(--shadow) !important;
        }

        [data-theme='dark'] .card-title,
        [data-theme='dark'] .header h1 {
            color: #FFFFFF !important;
            text-shadow: 0 0 10px rgba(0, 78, 140, 0.3);
        }
