<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #2A3645;
            --gold: #c5b358;
            --ink: #263038;
            --ink-soft: #606c78;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.88);
            --line: rgba(0, 78, 140, 0.22);
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 20px 46px rgba(28, 39, 50, 0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
            scrollbar-gutter: stable;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 120;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .theme-toggle {
            background: rgba(var(--primary-rgb), 0.08);
            border: 1px solid var(--line);
            color: var(--primary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: #fff;
            transform: rotate(30deg);
        }

        [data-theme='dark'] .theme-toggle {
            color: var(--gold);
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            list-style: none;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 0;
            width: 80px;
            text-align: center;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .container {
            width: min(1200px, 94vw);
            margin: 28px auto 34px;
            display: grid;
            gap: 24px;
        }

        .header {
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            text-align: center;
            padding: clamp(24px, 4vw, 40px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(32px, 4.4vw, 50px);
            margin-bottom: 0;
            color: var(--primary);
            letter-spacing: 0.8px;
        }

        .header p {
            color: var(--ink-soft);
            font-size: clamp(14px, 1.8vw, 18px);
            line-height: 1.8;
            max-width: 800px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .video-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: rgba(var(--primary-rgb), 0.4);
            box-shadow: 0 30px 60px rgba(28, 39, 50, 0.18);
        }

        .card-banner {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #fff;
            position: relative;
        }

        .bilibili-banner {
            background: linear-gradient(135deg, #00aeec, #0076a3);
        }

        .douyin-banner {
            background: linear-gradient(135deg, #1c0b1b, #000000);
        }

        .youtube-banner {
            background: linear-gradient(135deg, #ff0000, #b91d1d);
        }

        .card-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-desc {
            font-size: 15px;
            color: var(--ink-soft);
            line-height: 1.6;
        }

        .card-action {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            color: var(--primary);
            font-size: 14px;
        }

        .footer {
            width: min(1200px, 94vw);
            margin: 40px auto 34px;
            text-align: center;
            color: #8b97a2;
            font-size: 13px;
            border-top: 1px solid var(--line);
            padding-top: 30px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        /* --- Dark Theme --- */
        [data-theme='dark'] {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #000814;
            --gold: #c5b358;
            --ink: #FFFFFF;
            --ink-soft: #A0B3C6;
            --paper: #000814;
            --surface: rgba(0, 78, 140, 0.08);
            --line: rgba(0, 78, 140, 0.4);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        [data-theme='dark'] body {
            background: 
                radial-gradient(circle at 50% -20%, rgba(0, 78, 140, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 78, 140, 0.1) 0%, transparent 50%),
                var(--paper) !important;
            color: var(--ink) !important;
        }

        [data-theme='dark'] .top-nav {
            background: rgba(0, 8, 20, 0.8) !important;
            backdrop-filter: blur(20px) !important;
        }

        [data-theme='dark'] .nav-links a {
            color: var(--ink-soft);
        }

        [data-theme='dark'] .nav-links a:hover,
        [data-theme='dark'] .nav-links a.active {
            color: #FFFFFF !important;
            background: var(--primary) !important;
            box-shadow: 0 0 20px rgba(0, 78, 140, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.3) !important;
        }

        [data-theme='dark'] .header,
        [data-theme='dark'] .video-card {
            background: var(--surface) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid var(--line) !important;
            box-shadow: var(--shadow) !important;
        }

        [data-theme='dark'] .card-title,
        [data-theme='dark'] .header h1 {
            color: #FFFFFF !important;
            text-shadow: 0 0 10px rgba(0, 78, 140, 0.3);
        }
    </style>
</head>
