    <script>
        (function () {
            var state = { videos: [] };
            var refs = {
                grid: document.getElementById('videoGrid'),
                count: document.getElementById('videoCount'),
                modal: document.getElementById('videoModal'),
                backdrop: document.getElementById('videoModalBackdrop'),
                modalTitle: document.getElementById('videoModalTitle'),
                modalLink: document.getElementById('videoModalLink'),
                modalFrame: document.getElementById('videoModalFrame'),
                modalStage: document.getElementById('videoModalStage'),
                close: document.getElementById('videoModalClose'),
                fullscreen: document.getElementById('videoModalFullscreen')
            };

            function escapeHtml(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function truncate(text, maxLength) {
                var value = String(text || '');
                return value.length > maxLength ? value.slice(0, maxLength - 1) + '…' : value;
            }

            function watchUrl(video) {
                return video.watchUrl || ('https://www.bilibili.com/video/' + video.bvid);
            }

            function embedUrl(video) {
                return 'https://player.bilibili.com/player.html?bvid=' + encodeURIComponent(video.bvid) + '&cid=' + encodeURIComponent(video.cid) + '&page=1&as_wide=1&high_quality=1&danmaku=0';
            }

            function findVideo(bvid) {
                return state.videos.find(function (video) { return video.bvid === bvid; }) || null;
            }

            function cardHtml(video) {
                return '<article class="video-card" data-bvid="' + escapeHtml(video.bvid) + '">'
                    + '<div class="video-cover js-open-modal" data-bvid="' + escapeHtml(video.bvid) + '">'
                    + '<img src="' + escapeHtml(video.cover) + '" alt="' + escapeHtml(video.title) + '" loading="lazy">'
                    + '<div class="video-overlay">'
                    + '<span class="pill">' + escapeHtml(video.duration || '') + '</span>'
                    + '</div>'
                    + '</div>'
                    + '<div class="video-body">'
                    + '<div class="video-meta">'
                    + '<span class="platform-mark" aria-label="B&#31449;"><i class="fa-brands fa-bilibili"></i></span>'
                    + '<span class="video-date"><i class="fas fa-calendar-days"></i><span>' + escapeHtml(video.publishedAt || '') + '</span></span>'
                    + '</div>'
                    + '<h3 class="video-title">' + escapeHtml(video.title) + '</h3>'
                    + '<p class="video-summary">' + escapeHtml(truncate(video.summary || '', 120)) + '</p>'
                    + '</div>'
                    + '</article>';
            }

            function bindEvents() {
                document.querySelectorAll('.js-open-modal').forEach(function (node) {
                    node.addEventListener('click', function () {
                        var video = findVideo(node.getAttribute('data-bvid'));
                        if (video) openModal(video);
                    });
                });
            }
            function render() {
                if (!state.videos.length) {
                    refs.grid.innerHTML = '<div class="empty-state">暂时还没有可展示的视频数据。页面会优先读取 bilibili-videos.json，打不开时再回退到内置数据。</div>';
                    refs.count.textContent = '0 条视频';
                    return;
                }

                refs.grid.innerHTML = state.videos.map(function (video) { return cardHtml(video); }).join('');
                refs.count.textContent = state.videos.length + ' 条视频';
                bindEvents();
            }

            function openModal(video) {
                refs.modalTitle.textContent = video.title;
                refs.modalLink.href = watchUrl(video);
                refs.modalFrame.src = embedUrl(video);
                refs.modal.hidden = false;
                document.body.classList.add('modal-open');
            }

            function closeModal() {
                refs.modal.hidden = true;
                refs.modalFrame.src = 'about:blank';
                document.body.classList.remove('modal-open');
                if (document.fullscreenElement) {
                    document.exitFullscreen().catch(function () {});
                }
            }

            async function loadVideos() {
                var fallback = window.BILIBILI_VIDEOS_DATA && Array.isArray(window.BILIBILI_VIDEOS_DATA.videos)
                    ? window.BILIBILI_VIDEOS_DATA.videos
                    : [];

                if (window.location.protocol === 'file:') {
                    return fallback;
                }

                try {
                    var response = await fetch('bilibili-videos.json', { cache: 'no-store' });
                    if (!response.ok) throw new Error('json load failed');
                    var payload = await response.json();
                    if (payload && Array.isArray(payload.videos) && payload.videos.length) {
                        return payload.videos;
                    }
                } catch (error) {
                    console.warn('视频 JSON 读取失败，改用内置数据。', error);
                }

                return fallback;
            }

            refs.close.addEventListener('click', closeModal);
            refs.backdrop.addEventListener('click', closeModal);
            refs.fullscreen.addEventListener('click', function () {
                if (!document.fullscreenElement) {
                    refs.modalStage.requestFullscreen().catch(function () {});
                } else {
                    document.exitFullscreen().catch(function () {});
                }
            });

            document.addEventListener('keydown', function (event) {
                if (event.key === 'Escape' && !refs.modal.hidden) {
                    closeModal();
                }
            });

            loadVideos().then(function (videos) {
                state.videos = videos || [];
                render();
            }).catch(function () {
                state.videos = [];
                render();
            });
        }());
    </script>
    <script src="js/umami-config.js"></script>
    <script src="js/analytics.js"></script>
</body>
