    <script>
        let allArticles = [];
        let currentFilter = 'all';

        function track(name, props) {
            if (typeof trackEvent === 'function') {
                trackEvent(name, props);
            }
        }

        function hasArticleCover(article) {
            return Boolean(article.image && article.image !== 'images/article-placeholder.svg');
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        }

        async function loadArticles() {
            try {
                const response = await fetch('articles.json');
                const data = await response.json();
                allArticles = data.articles.sort((a, b) => new Date(b.date) - new Date(a.date));

                initializeFilters();
                renderArticles(allArticles);
            } catch (error) {
                console.error('加载文章失败:', error);
                document.getElementById('emptyState').style.display = 'block';
            }
        }

        function initializeFilters() {
            const categories = new Set();
            allArticles.forEach((article) => categories.add(article.category));

            const filterSection = document.getElementById('filterSection');
            const allBtn = filterSection.querySelector('[data-filter="all"]');

            if (allBtn) {
                allBtn.addEventListener('click', () => filterArticles('all', allBtn));
            }

            categories.forEach((category) => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = category;
                btn.dataset.filter = category;
                btn.addEventListener('click', () => filterArticles(category, btn));
                filterSection.appendChild(btn);
            });
        }

        function filterArticles(category, btn) {
            currentFilter = category;
            track('articles_filter_click', { category });

            document.querySelectorAll('.filter-btn').forEach((button) => {
                button.classList.remove('active');
            });
            btn.classList.add('active');

            const filtered = category === 'all'
                ? allArticles
                : allArticles.filter((article) => article.category === category);

            renderArticles(filtered);
        }

        function renderArticles(articles) {
            const grid = document.getElementById('articlesGrid');
            const emptyState = document.getElementById('emptyState');

            if (articles.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            const latestId = allArticles[0]?.id;

            grid.innerHTML = articles.map((article, index) => {
                const date = formatDate(article.date);
                const isLatest = article.id === latestId;
                const cover = hasArticleCover(article)
                    ? `
                        <div class="article-cover-shell">
                            ${isLatest ? '<span class="article-badge">最新</span>' : ''}
                            <img class="article-cover" src="${article.image}" alt="${article.title}" loading="lazy" decoding="async">
                        </div>
                    `
                    : '<div class="article-cover-shell article-cover-shell--empty" aria-hidden="true"></div>';

                return `
                    <a class="article-card ${isLatest ? 'article-card--latest' : ''}" style="--card-index: ${index}" href="posts/${article.id}.html" data-article-id="${article.id}" onclick="trackArticleClick(event)">
                        ${cover}
                        <div class="article-content">
                            <div class="article-meta">
                                <span class="article-category">${article.category}</span>
                                <span>${date}</span>
                            </div>
                            <h2 class="article-title">${article.title}</h2>
                            <p class="article-description">${article.description}</p>
                        </div>
                    </a>
                `;
            }).join('');
        }

        function trackArticleClick(event) {
            const articleId = event.currentTarget.getAttribute('data-article-id');
            track('article_card_click', {
                article_id: articleId,
                from_filter: currentFilter
            });
        }

        document.addEventListener('DOMContentLoaded', loadArticles);
    </script>
