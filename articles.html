    <style>
        :root {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #2A3645;
            --gold: #c5b358;
            --ink: #273039;
            --ink-soft: #5f6a75;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.86);
            --line: rgba(0, 78, 140, 0.22);
            --radius-xl: 18px;
            --radius-lg: 14px;
            --radius-md: 12px;
            --shadow: 0 20px 44px rgba(28, 39, 50, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: var(--font-sans);
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
            scrollbar-gutter: stable;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 120;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .theme-toggle {
            background: rgba(var(--primary-rgb), 0.08);
            border: 1px solid var(--line);
            color: #c5b358;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: #fff;
            transform: rotate(30deg);
        }

        [data-theme='dark'] .theme-toggle {
            color: var(--gold);
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            list-style: none;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 0;
            width: 80px;
            text-align: center;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #c5b358;
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .container {
            width: min(1200px, 94vw);
            margin: 28px auto 34px;
        }

        .header {
            padding: clamp(26px, 4vw, 44px);
            height: 220px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            width: 100%;
        }

        .header-title {
            font-family: var(--font-serif);
            font-size: clamp(32px, 4.4vw, 52px);
            color: #c5b358;
            margin-bottom: 0;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-mark {
            flex-shrink: 0;
            font-size: clamp(42px, 4.2vw, 58px);
            line-height: 1;
        }

        .header-subtitle {
            color: var(--ink-soft);
            font-size: clamp(14px, 1.8vw, 18px);
            line-height: 1.8;
        }

        .content-card {
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            padding: clamp(16px, 3vw, 26px);
        }

        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 9px 18px;
            background: rgba(var(--primary-rgb), 0.08);
            border: 1px solid rgba(var(--primary-rgb), 0.3);
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            color: #c5b358;
            transition: all 0.25s ease;
            font-size: 14px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--deep));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 10px 20px rgba(var(--primary-rgb), 0.3);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 16px;
        }

        .article-card {
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid rgba(var(--primary-rgb), 0.22);
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            min-height: 100%;
            animation: fadeInUp 0.5s ease forwards;
            animation-delay: calc(var(--card-index, 0) * 0.06s);
            opacity: 0;
            text-decoration: none;
        }

        .article-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 28px rgba(var(--primary-rgb), 0.22);
            border-color: rgba(var(--primary-rgb), 0.45);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .article-image-wrap {
            position: relative;
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.12), rgba(42, 54, 69, 0.12));
            border-bottom: 1px solid rgba(var(--primary-rgb), 0.12);
            overflow: hidden;
        }

        .article-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: linear-gradient(135deg, var(--primary), var(--deep));
        }

        .article-image-wrap.empty .article-image {
            opacity: 0;
        }

        .article-image-wrap.empty::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(var(--primary-rgb), 0.06), rgba(42, 54, 69, 0.04)),
                radial-gradient(circle at 80% 20%, rgba(var(--primary-rgb), 0.12), transparent 24%);
        }

        .article-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(39, 48, 57, 0.78);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            backdrop-filter: blur(8px);
        }

        .article-content {
            padding: 18px;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 10px;
        }

        .article-category {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            background: rgba(var(--primary-rgb), 0.12);
            color: #c5b358;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .article-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--ink);
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 54px;
            text-decoration: none;
        }

        .article-description {
            font-size: 13px;
            color: var(--ink-soft);
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
            text-decoration: none;
        }

        .article-meta {
            padding-top: 12px;
            border-top: 1px solid rgba(var(--primary-rgb), 0.14);
            font-size: 12px;
            color: #8a96a2;
        }

        .article-date {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 56px 20px;
            color: var(--ink-soft);
        }

        .empty-state-icon {
            font-size: 54px;
            margin-bottom: 16px;
            color: #c3cbd3;
        }

        .empty-state-text {
            font-size: 18px;
        }

        .footer {
            width: min(1200px, 94vw);
            margin: 40px auto 34px;
            text-align: center;
            color: #8b97a2;
            font-size: 13px;
            border-top: 1px solid var(--line);
            padding-top: 30px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .footer-links a:hover {
            color: #c5b358;
        }

        .footer-links .link-label {
            color: #c5b358;
            font-weight: 700;
            margin-right: 4px;
        }

        @media (max-width: 760px) {
            .header {
                height: auto;
                min-height: 220px;
            }

            .nav-links {
                justify-content: flex-start;
            }

            .articles-grid {
                grid-template-columns: 1fr;
            }

            .content-card {
                padding: 14px;
            }

            .filter-section {
                margin-bottom: 16px;
            }
        }

        [data-theme='dark'] {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;

            opacity: 0.04;

        [data-theme='dark'] .top-nav {

        [data-theme='dark'] .panel,

        [data-theme='dark'] .nav-links a {

        [data-theme='dark'] .nav-links a.active {

        }

        [data-theme='dark'] .tag,
        [data-theme='dark'] .filter-btn,
        [data-theme='dark'] .article-tag,
        [data-theme='dark'] .article-category {
            color: var(--ink-soft) !important;

        }

        [data-theme='dark'] .tag:hover,
        [data-theme='dark'] .filter-btn:hover,
        [data-theme='dark'] .filter-btn.active,
        [data-theme='dark'] .article-category:hover {
            background: var(--primary) !important;
            color: #FFFFFF !important;
            box-shadow: 0 0 15px rgba(0, 78, 140, 0.4) !important;
        }

        [data-theme='dark'] .article-image-wrap {
            background: linear-gradient(135deg, rgba(0, 78, 140, 0.18), rgba(0, 8, 20, 0.42));

        [data-theme='dark'] .article-image-wrap.empty::before {

        [data-theme='dark'] .article-badge {

        [data-theme='dark'] blockquote {

        .mobile-menu-btn {

    <script src="js/umami-config.js"></script>
    <script src="js/analytics.js"></script>
    <script>
        let allArticles = [];
        let currentFilter = 'all';

        function track(name, props) {
            if (typeof trackEvent === 'function') {
                trackEvent(name, props);
            }
        }

        function hasArticleCover(article) {
            return Boolean(article.image && article.image !== 'images/article-placeholder.svg');
        }

        async function loadArticles() {
            try {
                const response = await fetch('articles.json');
                const data = await response.json();
                allArticles = data.articles;

                allArticles.sort((a, b) => new Date(b.date) - new Date(a.date));

                initializeFilters();
                renderArticles(allArticles);
            } catch (error) {
                console.error('加载文章失败:', error);
                document.getElementById('emptyState').style.display = 'block';
            }
        }

        function initializeFilters() {
            const categories = new Set();
            allArticles.forEach(article => {
                categories.add(article.category);
            });

            const filterSection = document.getElementById('filterSection');
            const allBtn = filterSection.querySelector('[data-filter="all"]');
            if (allBtn) {
                allBtn.addEventListener('click', () => filterArticles('all', allBtn));
            }

            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = category;
                btn.dataset.filter = category;
                btn.addEventListener('click', () => filterArticles(category, btn));
                filterSection.appendChild(btn);
            });
        }

        function filterArticles(category, btn) {
            currentFilter = category;
            track('articles_filter_click', { category: category });

            document.querySelectorAll('.filter-btn').forEach(button => {
                button.classList.remove('active');
            });
            btn.classList.add('active');

            const filtered = category === 'all'
                ? allArticles
                : allArticles.filter(article => article.category === category);

            renderArticles(filtered);
        }

        function renderArticles(articles) {
            const grid = document.getElementById('articlesGrid');
            const emptyState = document.getElementById('emptyState');

            if (articles.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            const latestId = allArticles[0]?.id;

            grid.innerHTML = articles.map((article, index) => {
                const date = new Date(article.date).toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });
                const isLatest = article.id === latestId;
                const imageBlock = hasArticleCover(article)
                    ? `
                        <div class="article-image-wrap">
                            ${isLatest ? '<span class="article-badge">最新</span>' : ''}
                            <img class="article-image" src="${article.image}" alt="${article.title}" loading="lazy" decoding="async">
                        </div>
                    `
                    : `
                        <div class="article-image-wrap empty" aria-hidden="true">
                            <div class="article-image"></div>
                        </div>
                    `;

                return `
                    <a class="article-card" style="--card-index: ${index}" href="posts/${article.id}.html" data-article-id="${article.id}" onclick="trackArticleClick(event)">
                        ${imageBlock}
                        <div class="article-content">
                            <span class="article-category">${article.category}</span>
                            <h3 class="article-title">${article.title}</h3>
                            <p class="article-description">${article.description}</p>
                            <div class="article-meta">
                                <div class="article-date">
                                    <i class="far fa-calendar"></i>
                                    <span>${date}</span>
                                </div>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        function trackArticleClick(event) {
            const articleId = event.currentTarget.getAttribute('data-article-id');
            track('article_card_click', {
                article_id: articleId,
                from_filter: currentFilter
            });
        }

        document.addEventListener('DOMContentLoaded', loadArticles);
    </script>
