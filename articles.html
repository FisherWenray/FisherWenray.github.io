    <script>
        let allArticles = [];
        let currentFilter = 'all';

        async function loadArticles() {
            try {
                const response = await fetch('articles.json');
                const data = await response.json();
                allArticles = data.articles;

                allArticles.sort((a, b) => new Date(b.date) - new Date(a.date));

                initializeFilters();
                renderArticles(allArticles);
            } catch (error) {
                console.error('鍔犺浇鏂囩珷澶辫触:', error);
                document.getElementById('emptyState').style.display = 'block';
            }
        }

        function initializeFilters() {
            const categories = new Set();
            allArticles.forEach(article => {
                categories.add(article.category);
            });

            const filterSection = document.getElementById('filterSection');
            const allBtn = filterSection.querySelector('[data-filter="all"]');
            if (allBtn) {
                allBtn.addEventListener('click', () => filterArticles('all', allBtn));
            }

            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = category;
                btn.dataset.filter = category;
                btn.addEventListener('click', () => filterArticles(category, btn));
                filterSection.appendChild(btn);
            });
        }

        function filterArticles(category, btn) {
            currentFilter = category;
            trackEvent('articles_filter_click', { category: category });

            document.querySelectorAll('.filter-btn').forEach(button => {
                button.classList.remove('active');
            });
            btn.classList.add('active');

            const filtered = category === 'all'
                ? allArticles
                : allArticles.filter(article => article.category === category);

            renderArticles(filtered);
        }

        function renderArticles(articles) {
            const grid = document.getElementById('articlesGrid');
            const emptyState = document.getElementById('emptyState');

            if (articles.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            grid.innerHTML = articles.map((article, index) => {
                const date = new Date(article.date).toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });

                return `
                    <a class="article-card" style="--card-index: ${index}" href="posts/${article.id}.html" data-article-id="${article.id}" onclick="trackArticleClick(event)">
                        <div class="article-content">
                            <span class="article-category">${article.category}</span>
                            <h3 class="article-title">${article.title}</h3>
                            <p class="article-description">${article.description}</p>
                            <div class="article-meta">
                                <div class="article-date">
                                    <i class="far fa-calendar"></i>
                                    <span>${date}</span>
                                </div>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        function trackArticleClick(event) {
            const articleId = event.currentTarget.getAttribute('data-article-id');
            trackEvent('article_card_click', {
                article_id: articleId,
                from_filter: currentFilter
            });
        }

        document.addEventListener('DOMContentLoaded', loadArticles);
    </script>
