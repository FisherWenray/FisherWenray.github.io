<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表 - 文鳐夜飞</title>
    <link rel="icon" type="image/jpeg" href="微信图片_2026-01-23_124826_064.jpg">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #5D7B93;
            --primary-rgb: 93, 123, 147;
            --deep: #2A3645;
            --gold: #c5b358;
            --ink: #273039;
            --ink-soft: #5f6a75;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.86);
            --line: rgba(93, 123, 147, 0.22);
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 20px 44px rgba(28, 39, 50, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
            scrollbar-gutter: stable;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 120;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            list-style: none;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 0;
            width: 80px;
            text-align: center;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .container {
            width: min(1200px, 94vw);
            margin: 28px auto 34px;
        }

        .header {
            padding: clamp(26px, 4vw, 44px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            text-align: center;
        }

        .header-title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(32px, 4.4vw, 52px);
            color: var(--primary);
            margin-bottom: 10px;
            letter-spacing: 0.8px;
        }

        .header-subtitle {
            color: var(--ink-soft);
            font-size: clamp(14px, 1.8vw, 18px);
            line-height: 1.8;
        }

        .content-card {
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            padding: clamp(16px, 3vw, 26px);
        }

        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 9px 18px;
            background: rgba(var(--primary-rgb), 0.08);
            border: 1px solid rgba(var(--primary-rgb), 0.3);
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            color: var(--primary);
            transition: all 0.25s ease;
            font-size: 14px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--deep));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 10px 20px rgba(var(--primary-rgb), 0.3);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 16px;
        }

        .article-card {
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid rgba(var(--primary-rgb), 0.22);
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            min-height: 100%;
            animation: fadeInUp 0.5s ease forwards;
            animation-delay: calc(var(--card-index, 0) * 0.06s);
            opacity: 0;
        }

        .article-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 28px rgba(var(--primary-rgb), 0.22);
            border-color: rgba(var(--primary-rgb), 0.45);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .article-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--primary), var(--deep));
        }

        .article-content {
            padding: 18px;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 10px;
        }

        .article-category {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            background: rgba(var(--primary-rgb), 0.12);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .article-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--ink);
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 54px;
        }

        .article-description {
            font-size: 13px;
            color: var(--ink-soft);
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .article-meta {
            padding-top: 12px;
            border-top: 1px solid rgba(var(--primary-rgb), 0.14);
            font-size: 12px;
            color: #8a96a2;
        }

        .article-date {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 56px 20px;
            color: var(--ink-soft);
        }

        .empty-state-icon {
            font-size: 54px;
            margin-bottom: 16px;
            color: #c3cbd3;
        }

        .empty-state-text {
            font-size: 18px;
        }

        .footer {
            width: min(1200px, 94vw);
            margin: 40px auto 34px;
            text-align: center;
            color: #8b97a2;
            font-size: 13px;
            border-top: 1px solid var(--line);
            padding-top: 30px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .footer-links .link-label {
            color: var(--primary);
            font-weight: 700;
            margin-right: 4px;
        }

        @media (max-width: 760px) {
            .nav-links {
                justify-content: flex-start;
            }

            .articles-grid {
                grid-template-columns: 1fr;
            }

            .content-card {
                padding: 14px;
            }

            .filter-section {
                margin-bottom: 16px;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="articles.html" class="active">Blog</a></li>
                <li><a href="podcast.html">播客</a></li>
                <li><a href="software.html">产品</a></li>
                <li><a href="music.html">音乐</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1 class="header-title">文章</h1>
            <p class="header-subtitle">分享关于"一人"公司(OPC)、投资悟道、自我成长</p>
        </div>

        <div class="content-card">
            <div class="filter-section" id="filterSection">
                <button class="filter-btn active" data-filter="all">全部</button>
            </div>

            <div class="articles-grid" id="articlesGrid"></div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">
                    <i class="fas fa-inbox"></i>
                </div>
                <div class="empty-state-text">暂无文章</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-links">
            <span class="link-label">友情链接</span>
            <a href="https://muimi.club" target="_blank" rel="noopener" data-umami-event="friend_link_click"
                data-umami-props='{"site":"muimi.club", "from":"footer"}'>
                <i class="fas fa-link"></i>
                <span>Muimi Club</span>
            </a>
        </div>
        <p>© 2026 文鳐夜飞 | 追求自由之路</p>
    </div>

    <script src="js/umami-config.js"></script>
    <script src="js/analytics.js"></script>
    <script>
        let allArticles = [];
        let currentFilter = 'all';

        async function loadArticles() {
            try {
                const response = await fetch('articles.json');
                const data = await response.json();
                allArticles = data.articles;

                allArticles.sort((a, b) => new Date(b.date) - new Date(a.date));

                initializeFilters();
                renderArticles(allArticles);
            } catch (error) {
                console.error('加载文章失败:', error);
                document.getElementById('emptyState').style.display = 'block';
            }
        }

        function initializeFilters() {
            const categories = new Set();
            allArticles.forEach(article => {
                categories.add(article.category);
            });

            const filterSection = document.getElementById('filterSection');
            const allBtn = filterSection.querySelector('[data-filter="all"]');
            if (allBtn) {
                allBtn.addEventListener('click', () => filterArticles('all', allBtn));
            }

            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = category;
                btn.dataset.filter = category;
                btn.addEventListener('click', () => filterArticles(category, btn));
                filterSection.appendChild(btn);
            });
        }

        function filterArticles(category, btn) {
            currentFilter = category;
            trackEvent('articles_filter_click', { category: category });

            document.querySelectorAll('.filter-btn').forEach(button => {
                button.classList.remove('active');
            });
            btn.classList.add('active');

            const filtered = category === 'all'
                ? allArticles
                : allArticles.filter(article => article.category === category);

            renderArticles(filtered);
        }

        function renderArticles(articles) {
            const grid = document.getElementById('articlesGrid');
            const emptyState = document.getElementById('emptyState');

            if (articles.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            grid.innerHTML = articles.map((article, index) => {
                const date = new Date(article.date).toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });

                return `
                    <div class="article-card" style="--card-index: ${index}" onclick="goToArticle('${article.id}')">
                        <img src="${article.image}" alt="${article.title}" class="article-image" loading="lazy" onerror="this.src='images/article-placeholder.svg'">
                        <div class="article-content">
                            <span class="article-category">${article.category}</span>
                            <h3 class="article-title">${article.title}</h3>
                            <p class="article-description">${article.description}</p>
                            <div class="article-meta">
                                <div class="article-date">
                                    <i class="far fa-calendar"></i>
                                    <span>${date}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function goToArticle(articleId) {
            trackEvent('article_card_click', {
                article_id: articleId,
                from_filter: currentFilter
            });
            window.location.href = `article.html?id=${articleId}`;
        }

        document.addEventListener('DOMContentLoaded', loadArticles);
    </script>
</body>

</html>
