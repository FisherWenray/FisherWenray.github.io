<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播客节目 - 文鳐夜飞</title>
    <link rel="icon" type="image/jpeg" href="微信图片_2026-01-23_124826_064.jpg">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #5D7B93;
            --primary-rgb: 93, 123, 147;
            --deep: #2A3645;
            --gold: #c5b358;
            --ink: #263038;
            --ink-soft: #606c78;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.88);
            --line: rgba(93, 123, 147, 0.22);
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 20px 46px rgba(28, 39, 50, 0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
            padding-bottom: 124px;
        }

        body.player-active {
            padding-bottom: 148px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 160;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            list-style: none;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .container {
            width: min(1200px, 94vw);
            margin: 28px auto 34px;
            display: grid;
            gap: 20px;
        }

        .header {
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            text-align: center;
            padding: clamp(24px, 4vw, 40px);
        }

        .header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(32px, 4.4vw, 50px);
            margin-bottom: 8px;
            color: var(--primary);
            letter-spacing: 0.8px;
        }

        .header p {
            color: var(--ink-soft);
            font-size: clamp(14px, 1.8vw, 18px);
            line-height: 1.8;
        }

        .podcast-shell {
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            padding: clamp(16px, 3vw, 24px);
        }

        .controls {
            display: grid;
            gap: 12px;
            margin-bottom: 18px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            min-width: 230px;
            padding: 11px 14px;
            border: 1px solid rgba(var(--primary-rgb), 0.28);
            border-radius: 999px;
            font-size: 14px;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.25s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.16);
        }

        .search-btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--deep));
            box-shadow: 0 10px 20px rgba(var(--primary-rgb), 0.3);
            transition: transform 0.25s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(var(--primary-rgb), 0.3);
            background: rgba(var(--primary-rgb), 0.08);
            color: var(--primary);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .filter-tab.active {
            border-color: transparent;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--deep));
        }

        .loading {
            text-align: center;
            padding: 42px 20px;
            color: var(--ink-soft);
        }

        .loading i {
            font-size: 34px;
            margin-bottom: 14px;
            color: var(--primary);
            animation: spin 1.4s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .episodes-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .episode-item {
            background: rgba(255, 255, 255, 0.86);
            border-radius: var(--radius-md);
            display: flex;
            align-items: stretch;
            border: 1px solid rgba(var(--primary-rgb), 0.2);
            border-left: 3px solid var(--gold);
            overflow: hidden;
            min-height: 132px;
            transition: all 0.3s ease;
        }

        .episode-item:hover {
            transform: translateX(4px);
            border-left-color: var(--primary);
            box-shadow: 0 12px 24px rgba(var(--primary-rgb), 0.18);
        }

        .episode-cover {
            width: 138px;
            height: 138px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .episode-main {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            min-width: 0;
        }

        .play-btn-icon {
            flex-shrink: 0;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--deep));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            transition: all 0.25s ease;
            cursor: pointer;
            box-shadow: 0 10px 18px rgba(var(--primary-rgb), 0.28);
        }

        .episode-item:hover .play-btn-icon {
            transform: scale(1.06);
        }

        .episode-content {
            flex: 1;
            min-width: 0;
        }

        .episode-header {
            margin-bottom: 7px;
        }

        .episode-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
            line-height: 1.45;
        }

        .episode-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #8a96a2;
            margin-bottom: 6px;
        }

        .episode-description {
            font-size: 12px;
            color: var(--ink-soft);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .episode-item.expanded .episode-description {
            display: block;
            -webkit-line-clamp: unset;
            white-space: pre-wrap;
        }

        .more-link,
        .collapse-link {
            color: #8a96a2;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            margin-top: 6px;
            transition: color 0.25s ease;
        }

        .more-link:hover,
        .collapse-link:hover {
            color: var(--primary);
        }

        .collapse-link {
            display: none;
        }

        .episode-item.expanded .more-link {
            display: none;
        }

        .episode-item.expanded .collapse-link {
            display: inline-block;
        }

        .empty-state {
            text-align: center;
            padding: 56px 20px;
            color: var(--ink-soft);
        }

        .empty-state i {
            font-size: 56px;
            color: #c1cad3;
            margin-bottom: 14px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: #5b6773;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            color: #8a96a2;
        }

        .mini-player {
            display: none;
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 190;
            border-top: 1px solid rgba(var(--primary-rgb), 0.25);
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            box-shadow: 0 -8px 24px rgba(18, 27, 36, 0.16);
        }

        .mini-player-inner {
            width: min(1200px, 96vw);
            margin: 0 auto;
            padding: 10px 0 12px;
        }

        .mini-progress-track {
            width: 100%;
            height: 4px;
            background: rgba(var(--primary-rgb), 0.15);
            border-radius: 99px;
            margin-bottom: 10px;
            cursor: pointer;
            overflow: hidden;
        }

        #progressBar {
            height: 100%;
            width: 0;
            background: linear-gradient(135deg, var(--primary), var(--deep));
            border-radius: 99px;
        }

        .mini-main {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .mini-info {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mini-icon {
            width: 46px;
            height: 46px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--deep));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }

        .mini-text {
            min-width: 0;
        }

        .mini-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mini-sub {
            font-size: 12px;
            color: #8a96a2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mini-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border: none;
            background: transparent;
            color: #8a96a2;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 17px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            color: var(--primary);
            background: rgba(var(--primary-rgb), 0.1);
        }

        .icon-btn.primary {
            width: 42px;
            height: 42px;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--deep));
            box-shadow: 0 10px 16px rgba(var(--primary-rgb), 0.3);
        }

        .icon-btn.primary:hover {
            color: #fff;
            transform: scale(1.04);
        }

        .mini-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .speed-wrap {
            position: relative;
        }

        #speedBtn {
            border: none;
            background: transparent;
            color: #8a96a2;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            padding: 7px 10px;
            border-radius: 999px;
        }

        #speedBtn:hover {
            color: var(--primary);
            background: rgba(var(--primary-rgb), 0.1);
        }

        #speedMenu {
            display: none;
            position: absolute;
            bottom: calc(100% + 4px);
            right: 0;
            border-radius: 10px;
            border: 1px solid rgba(var(--primary-rgb), 0.22);
            background: #fff;
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.15);
            z-index: 10;
            overflow: hidden;
            min-width: 82px;
        }

        #speedMenu [data-speed] {
            padding: 7px 12px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            white-space: nowrap;
        }

        #speedMenu [data-speed]:hover {
            background: #f7f8f9;
        }

        #volumeSlider {
            width: 78px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        @media (max-width: 860px) {
            .episode-item {
                flex-direction: column;
            }

            .episode-cover {
                width: 100%;
                height: 180px;
            }

            .mini-main {
                flex-wrap: wrap;
                gap: 10px;
            }

            .mini-actions {
                margin-left: auto;
            }
        }

        @media (max-width: 680px) {
            body {
                padding-bottom: 164px;
            }

            .nav-links {
                justify-content: flex-start;
            }

            .search-box {
                flex-direction: column;
            }

            .search-box input {
                min-width: 0;
                width: 100%;
            }

            .search-btn {
                justify-content: center;
            }

            .mini-player-inner {
                width: 94vw;
            }

            #volumeSlider {
                width: 64px;
            }
        }
    </style>
</head>

        <script src="js/umami-config.js"></script>
        <script src="js/analytics.js"></script>
        <script>
            let allEpisodes = [];
            let filteredEpisodes = [];
            let currentFilter = 'all';
            let currentPlayer = null;

            // 苹果播客 ID（可根据需要修改）
            const APPLE_PODCAST_ID = '1825759955';

            // 初始加载
            window.addEventListener('DOMContentLoaded', function () {
                loadPodcasts();
            });

            // 加载所有播客数据
            async function loadPodcasts() {
                try {
                    // 显示加载状态
                    document.getElementById('contentArea').innerHTML = `
                    <div class="loading">
                        <i class="fas fa-spinner"></i>
                        <p>正在加载播客节目...</p>
                    </div>
                `;

                    // 加载苹果播客数据
                    const appleEpisodes = await loadApplePodcasts();

                    // 合并所有剧集
                    allEpisodes = [...appleEpisodes];
                    filteredEpisodes = [...allEpisodes];

                    // 按日期排序（最新的优先）
                    allEpisodes.sort((a, b) => new Date(b.date) - new Date(a.date));
                    filteredEpisodes.sort((a, b) => new Date(b.date) - new Date(a.date));
                    renderEpisodes();
                } catch (error) {
                    console.error('加载播客失败:', error);
                    document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>加载失败</h3>
                        <p>无法获取播客数据，请检查网络连接或稍后重试</p>
                    </div>
                `;
                }
            }

            // 从苹果播客加载 (使用 JSONP 避免 CORS 问题)
            async function loadApplePodcasts() {
                return new Promise((resolve, reject) => {
                    try {
                        // 创建唯一的回调函数名
                        const callbackName = 'applePodcastCallback_' + Date.now();

                        // 定义回调函数
                        window[callbackName] = function (data) {
                            // 清理
                            delete window[callbackName];
                            document.body.removeChild(script);

                            const results = data.results || [];
                            // 第一个结果是播客本身，后面才是剧集
                            const collection = results[0];
                            const collectionCover = collection ? (collection.artworkUrl600 || collection.artworkUrl100) : '';
                            const episodes = results.slice(1);

                            const mappedEpisodes = episodes.map((ep, index) => ({
                                id: `apple_${index}`,
                                platform: 'apple',
                                platformName: '苹果播客',
                                title: ep.trackName || '未知标题',
                                description: ep.description || '暂无描述',
                                date: new Date(ep.releaseDate).toISOString().split('T')[0],
                                duration: formatDuration(Math.round((ep.trackTimeMillis || 0) / 1000)),
                                audioUrl: ep.episodeUrl || '',
                                coverUrl: ep.artworkUrl600 || ep.artworkUrl100 || collectionCover || '',
                                externalUrl: `https://podcasts.apple.com/cn/podcast/id${APPLE_PODCAST_ID}`
                            }));

                            resolve(mappedEpisodes);
                        };

                        // 创建 script 标签进行 JSONP 请求
                        const script = document.createElement('script');
                        script.src = `https://itunes.apple.com/lookup?id=${APPLE_PODCAST_ID}&country=CN&media=podcast&entity=podcastEpisode&limit=200&callback=${callbackName}`;
                        script.onerror = function () {
                            delete window[callbackName];
                            document.body.removeChild(script);
                            console.warn('苹果播客 JSONP 加载失败');
                            resolve([]);
                        };

                        // 设置超时
                        setTimeout(() => {
                            if (window[callbackName]) {
                                delete window[callbackName];
                                if (script.parentNode) {
                                    document.body.removeChild(script);
                                }
                                console.warn('苹果播客加载超时');
                                resolve([]);
                            }
                        }, 10000);

                        document.body.appendChild(script);
                    } catch (error) {
                        console.warn('苹果播客加载失败:', error);
                        resolve([]);
                    }
                });
            }

            // 格式化时长（秒 -> HH:MM:SS）
            function formatDuration(seconds) {
                if (!seconds || seconds === 0) return '未知';
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;

                if (hours > 0) {
                    return `${hours}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                }
                return `${minutes}:${String(secs).padStart(2, '0')}`;
            }

            // 过滤播客平台
            function filterByPlatform(platform) {
                currentFilter = platform;
                trackEvent('podcast_filter_click', { platform: platform });
                document.querySelectorAll('.filter-tab').forEach(tab => {
                    tab.classList.remove('active');
                });
                if (typeof event !== 'undefined' && event.target && event.target.closest('.filter-tab')) {
                    event.target.closest('.filter-tab').classList.add('active');
                }

                if (platform === 'all') {
                    filteredEpisodes = [...allEpisodes];
                } else {
                    filteredEpisodes = allEpisodes.filter(ep => ep.platform === platform);
                }
                renderEpisodes();
            }

            // 搜索
            function performSearch() {
                const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
                if (keyword) {
                    filteredEpisodes = allEpisodes.filter(ep => {
                        const matchFilter = currentFilter === 'all' || ep.platform === currentFilter;
                        const matchKeyword = ep.title.toLowerCase().includes(keyword) ||
                            ep.description.toLowerCase().includes(keyword);
                        return matchFilter && matchKeyword;
                    });
                } else {
                    if (currentFilter === 'all') {
                        filteredEpisodes = [...allEpisodes];
                    } else {
                        filteredEpisodes = allEpisodes.filter(ep => ep.platform === currentFilter);
                    }
                }
                renderEpisodes();
                trackEvent('podcast_search', {
                    keyword: keyword || 'all',
                    filter: currentFilter,
                    result_count: filteredEpisodes.length
                });
            }

            // 回车键搜索
            window.addEventListener('DOMContentLoaded', function () {
                const searchInput = document.getElementById('searchInput');
                if (searchInput) {
                    searchInput.addEventListener('keypress', function (e) {
                        if (e.key === 'Enter') {
                            performSearch();
                        }
                    });
                }
            });

            // 渲染剧集列表
            // 渲染剧集列表
            function renderEpisodes() {
                const contentArea = document.getElementById('contentArea');

                if (filteredEpisodes.length === 0) {
                    contentArea.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>未找到匹配的节目</h3>
                        <p>请尝试其他搜索关键词或过滤条件</p>
                    </div>
                `;
                    return;
                }

                const episodesHTML = filteredEpisodes.map((ep, index) => `
                <div class="episode-item" id="episode-${index}">
                    <img src="${ep.coverUrl}" class="episode-cover" alt="封面" onerror="this.src='images/article-placeholder.svg'">
                    <div class="episode-main">
                        <div class="play-btn-icon" onclick="event.stopPropagation(); playEpisode(${index})">
                            <i class="fas fa-play"></i>
                        </div>
                        <div class="episode-content">
                            <div class="episode-header">
                                <div class="episode-title">${ep.title}</div>
                            </div>
                            <div class="episode-meta">
                                <span>${formatDate(ep.date)}</span>
                                <span>•</span>
                                <span>${ep.duration}</span>
                            </div>
                            <div class="episode-description" id="desc-${index}">${ep.description}</div>
                            <span class="more-link" id="more-${index}" onclick="toggleShowNotes(${index})">MORE</span>
                            <span class="collapse-link" id="collapse-${index}" onclick="toggleShowNotes(${index})" style="display:none">收起</span>
                        </div>
                    </div>
                </div>
            `).join('');

                contentArea.innerHTML = `<div class="episodes-list">${episodesHTML}</div>`;
            }

            // 展开/收起摘要
            function toggleShowNotes(index) {
                const episodeElement = document.getElementById(`episode-${index}`);
                const descElement = document.getElementById(`desc-${index}`);
                const moreElement = document.getElementById(`more-${index}`);
                const collapseElement = document.getElementById(`collapse-${index}`);

                if (episodeElement) {
                    episodeElement.classList.toggle('expanded');

                    if (episodeElement.classList.contains('expanded')) {
                        // 展开：显示完整内容，隐藏MORE，显示收起
                        descElement.style.display = 'block';
                        moreElement.style.display = 'none';
                        collapseElement.style.display = 'inline-block';
                    } else {
                        // 收起：显示2行，显示MORE，隐藏收起
                        descElement.style.display = '-webkit-box';
                        moreElement.style.display = 'inline-block';
                        collapseElement.style.display = 'none';
                    }
                }
            }

            // 播放剧集
            // 播放剧集
            // 播放剧集
            function playEpisode(episodeIndex) {
                const episode = filteredEpisodes[episodeIndex];
                if (!episode) return;

                trackEvent('podcast_play_click', {
                    episode_id: episode.id,
                    platform: episode.platform
                });

                currentPlayer = episode;

                // 更新迷你播放器
                document.getElementById('miniPlayerTitle').textContent = episode.title;
                document.getElementById('miniPlayerPlatform').textContent = episode.platformName;

                // 设置音频源
                const audioPlayer = document.getElementById('audioPlayer');
                if (episode.audioUrl) {
                    audioPlayer.src = episode.audioUrl;
                    audioPlayer.load();
                    audioPlayer.play().catch(error => {
                        console.warn('播放失败:', error);
                        alert('无法播放此剧集，可能是音频链接失效或不支持跨域访问');
                    });
                } else {
                    console.warn('该剧集没有音频 URL:', episode.title);
                    alert('该剧集暂无音频');
                    return;
                }

                // 显示迷你播放器并更新样式
                document.getElementById('miniPlayer').style.display = 'block';
                document.body.classList.add('player-active');

                // 更新播放按钮
                updatePlayButton();

                // 监听播放器事件
                audioPlayer.addEventListener('play', updatePlayButton);
                audioPlayer.addEventListener('pause', updatePlayButton);
                audioPlayer.addEventListener('timeupdate', updateProgress);
            }

            // 更新播放按钮状态
            function updatePlayButton() {
                const audioPlayer = document.getElementById('audioPlayer');
                const btn = document.getElementById('playToggleBtn');
                if (audioPlayer.paused) {
                    btn.innerHTML = '<i class="fas fa-play"></i>';
                } else {
                    btn.innerHTML = '<i class="fas fa-pause"></i>';
                }
            }

            // 更新进度条
            function updateProgress() {
                const audioPlayer = document.getElementById('audioPlayer');
                const progressBar = document.getElementById('progressBar');
                const timeDisplay = document.getElementById('miniPlayerTime');

                if (audioPlayer.duration) {
                    const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                    progressBar.style.width = percent + '%';

                    const current = formatTime(audioPlayer.currentTime);
                    const total = formatTime(audioPlayer.duration);
                    timeDisplay.textContent = current + ' / ' + total;
                }
            }

            // 格式化时间显示
            function formatTime(seconds) {
                if (isNaN(seconds)) return '00:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }

            // 关闭迷你播放器
            function closeMiniPlayer() {
                const audioPlayer = document.getElementById('audioPlayer');
                audioPlayer.pause();
                document.getElementById('miniPlayer').style.display = 'none';
                document.body.classList.remove('player-active');
            }

            // 播放/暂停
            document.addEventListener('DOMContentLoaded', function () {
                const playToggleBtn = document.getElementById('playToggleBtn');
                if (playToggleBtn) {
                    playToggleBtn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        const audioPlayer = document.getElementById('audioPlayer');
                        if (audioPlayer.paused) {
                            audioPlayer.play();
                        } else {
                            audioPlayer.pause();
                        }
                    });
                }

                // 速度控制菜单
                const speedBtn = document.getElementById('speedBtn');
                const speedMenu = document.getElementById('speedMenu');
                if (speedBtn && speedMenu) {
                    speedBtn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        speedMenu.style.display = speedMenu.style.display === 'none' ? 'block' : 'none';
                    });

                    // 为每个速度选项添加点击处理
                    const speedOptions = speedMenu.querySelectorAll('[data-speed]');
                    speedOptions.forEach(option => {
                        option.addEventListener('click', function (e) {
                            e.stopPropagation();
                            const speed = parseFloat(this.getAttribute('data-speed'));
                            const audioPlayer = document.getElementById('audioPlayer');
                            audioPlayer.playbackRate = speed;
                            trackEvent('podcast_speed_change', { speed: speed });

                            // 更新按钮显示
                            speedBtn.textContent = speed === 1 ? '1x' : speed.toFixed(2) + 'x';

                            // 更新菜单项的样式
                            speedOptions.forEach(opt => {
                                const optSpeed = parseFloat(opt.getAttribute('data-speed'));
                                if (optSpeed === speed) {
                                    opt.style.color = '#5D7B93';
                                    opt.style.fontWeight = '600';
                                    opt.style.background = '#f5f5f5';
                                } else {
                                    opt.style.color = '#666';
                                    opt.style.fontWeight = '400';
                                    opt.style.background = 'transparent';
                                }
                            });

                            // 关闭菜单
                            speedMenu.style.display = 'none';
                        });

                        // 悬停效果
                        option.addEventListener('mouseenter', function () {
                            this.style.background = '#fafafa';
                        });
                        option.addEventListener('mouseleave', function () {
                            const speed = parseFloat(this.getAttribute('data-speed'));
                            const currentSpeed = document.getElementById('audioPlayer').playbackRate;
                            if (speed !== currentSpeed) {
                                this.style.background = 'transparent';
                            }
                        });
                    });

                    // 点击其他地方关闭菜单
                    document.addEventListener('click', function (e) {
                        if (!speedBtn.contains(e.target) && !speedMenu.contains(e.target)) {
                            speedMenu.style.display = 'none';
                        }
                    });
                }

                // 音量控制滑块
                const volumeSlider = document.getElementById('volumeSlider');
                const audioPlayer = document.getElementById('audioPlayer');
                if (volumeSlider && audioPlayer) {
                    volumeSlider.addEventListener('input', function (e) {
                        audioPlayer.volume = this.value / 100;
                    });
                }
            });


            // 日期格式化
            function formatDate(dateString) {
                const date = new Date(dateString);
                const options = { year: 'numeric', month: 'short', day: 'numeric' };
                return date.toLocaleDateString('zh-CN', options);
            }
        </script>
</body>
