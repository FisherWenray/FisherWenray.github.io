<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播客节目 - 文鳐夜飞</title>
    <script src="js/theme.js"></script>
    <link rel="icon" type="image/jpeg" href="微信图片_2026-01-23_124826_064.jpg">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 预连接 Apple API 和图片 CDN，减少 DNS/TLS 延迟 -->
    <link rel="preconnect" href="https://itunes.apple.com">
    <link rel="dns-prefetch" href="https://is1-ssl.mzstatic.com">
    <link rel="dns-prefetch" href="https://is2-ssl.mzstatic.com">
    <link rel="dns-prefetch" href="https://is3-ssl.mzstatic.com">
    <link rel="dns-prefetch" href="https://is4-ssl.mzstatic.com">
    <link rel="dns-prefetch" href="https://is5-ssl.mzstatic.com">

    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #2A3645;
            --gold: #c5b358;
            --ink: #263038;
            --ink-soft: #606c78;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.88);
            --line: rgba(0, 78, 140, 0.22);
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 20px 46px rgba(28, 39, 50, 0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
            scrollbar-gutter: stable;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 120;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .theme-toggle {
            background: rgba(var(--primary-rgb), 0.08);
            border: 1px solid var(--line);
            color: var(--primary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: #fff;
            transform: rotate(30deg);
        }

        [data-theme='dark'] .theme-toggle {
            color: var(--gold);
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            list-style: none;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 0;
            width: 80px;
            text-align: center;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .container {
            width: min(1200px, 94vw);
            margin: 28px auto 34px;
            display: grid;
            gap: 20px;
        }

        .header {
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            padding: clamp(20px, 3vw, 32px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            width: 100%;
        }

        .header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(28px, 3.5vw, 42px);
            margin-bottom: 0;
            color: var(--primary);
            letter-spacing: 0.8px;
            white-space: nowrap;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            width: 100%;
            border-top: 1px solid rgba(var(--primary-rgb), 0.1);
            padding-top: 20px;
        }

        .header p {
            color: var(--ink-soft);
            font-size: 15px;
            margin-bottom: 0;
            white-space: nowrap;
        }

        .podcast-platforms {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .platform-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(var(--primary-rgb), 0.04);
            border: 1px solid rgba(var(--primary-rgb), 0.12);
            border-radius: 999px;
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            font-weight: 600;
        }

        .platform-link i {
            font-size: 16px;
        }

        .platform-link:hover {
            transform: translateY(-2px);
            background: var(--primary);
            color: #fff !important;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(var(--primary-rgb), 0.25);
        }

        /* 悬停时的官方品牌色背景与发光感 */
        .platform-link.xiaoyuzhou:hover { 
            background: #00b2ff !important; 
            border-color: #00b2ff;
            color: #fff !important;
            box-shadow: 0 8px 24px rgba(0, 178, 255, 0.4); 
        }
        .platform-link.ximalaya:hover { 
            background: #fa2800 !important; 
            border-color: #fa2800;
            color: #fff !important;
            box-shadow: 0 8px 24px rgba(250, 40, 0, 0.4); 
        }
        .platform-link.apple:hover { 
            background: #a356de !important; 
            border-color: #a356de;
            color: #fff !important;
            box-shadow: 0 8px 24px rgba(163, 86, 222, 0.4); 
        }
        .platform-link.spotify:hover { 
            background: #1db954 !important; 
            border-color: #1db954;
            color: #fff !important;
            box-shadow: 0 8px 24px rgba(29, 185, 84, 0.4); 
        }

        [data-theme='dark'] .platform-link {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--ink-soft);
        }
        
        [data-theme='dark'] .platform-link:hover {
            color: #fff !important;
        }

        .podcast-shell {
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            padding: clamp(16px, 3vw, 24px);
        }

        .controls {
            display: grid;
            gap: 12px;
            margin-bottom: 18px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            min-width: 230px;
            padding: 11px 14px;
            border: 1px solid rgba(var(--primary-rgb), 0.28);
            border-radius: 999px;
            font-size: 14px;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.25s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.16);
        }

        .search-btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--deep));
            box-shadow: 0 10px 20px rgba(var(--primary-rgb), 0.3);
            transition: transform 0.25s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(var(--primary-rgb), 0.3);
            background: rgba(var(--primary-rgb), 0.08);
            color: var(--primary);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .filter-tab.active {
            border-color: transparent;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--deep));
        }

        /* 友情链接和页脚样式 */
        .footer {
            width: min(1200px, 94vw);
            margin: 40px auto 34px;
            text-align: center;
            color: #8b97a2;
            font-size: 13px;
            border-top: 1px solid var(--line);
            padding-top: 30px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .footer-links .link-label {
            color: var(--primary);
            font-weight: 700;
            margin-right: 4px;
        }

        .loading {
            text-align: center;
            padding: 42px 20px;
            color: var(--ink-soft);
        }

        .loading i {
            font-size: 34px;
            margin-bottom: 14px;
            color: var(--primary);
            animation: spin 1.4s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* 骨架屏样式 */
        .episode-skeleton {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.86);
            border-radius: var(--radius-md);
            border: 1px solid rgba(var(--primary-rgb), 0.2);
            overflow: hidden;
            padding: 0;
        }

        .skel-cover {
            width: 132px;
            height: 100px;
            background: linear-gradient(110deg, #e4e8ec 30%, #f0f2f4 50%, #e4e8ec 70%);
            background-size: 200% 100%;
            animation: skel-pulse 1.4s ease-in-out infinite;
            flex-shrink: 0;
        }

        .skel-info {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skel-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(110deg, #e4e8ec 30%, #f0f2f4 50%, #e4e8ec 70%);
            background-size: 200% 100%;
            animation: skel-pulse 1.4s ease-in-out infinite;
        }

        .skel-title {
            width: 55%;
            height: 16px;
        }

        .skel-meta {
            width: 30%;
        }

        .skel-desc {
            width: 90%;
        }

        .skel-desc2 {
            width: 70%;
        }

        @keyframes skel-pulse {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .episodes-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .episode-item {
            background: rgba(255, 255, 255, 0.86);
            border-radius: var(--radius-md);
            border: 1px solid rgba(var(--primary-rgb), 0.2);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .episode-item:hover {
            border-color: rgba(var(--primary-rgb), 0.35);
            box-shadow: 0 8px 20px rgba(var(--primary-rgb), 0.14);
        }

        .episode-mini {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 16px 20px;
            cursor: pointer;
        }

        .episode-cover {
            width: 72px;
            height: 72px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 12px rgba(42, 54, 69, 0.12);
            flex-shrink: 0;
        }

        .episode-info {
            flex: 1;
            min-width: 0;
        }

        .episode-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.45;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .episode-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #8a96a2;
        }

        .play-btn-icon {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--deep));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            transition: all 0.25s ease;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(var(--primary-rgb), 0.28);
        }

        .play-btn-icon:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 22px rgba(var(--primary-rgb), 0.35);
        }

        .episode-details {
            padding: 0 20px 16px;
            display: none;
        }

        .episode-details.show {
            display: block;
        }

        .episode-description {
            font-size: 13px;
            color: var(--ink-soft);
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .more-link,
        .collapse-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: inline-block;
            margin-top: 8px;
            transition: color 0.25s ease;
            letter-spacing: 0.5px;
        }

        .more-link:hover,
        .collapse-link:hover {
            color: var(--deep);
        }

        .empty-state {
            text-align: center;
            padding: 56px 20px;
            color: var(--ink-soft);
        }

        .empty-state i {
            font-size: 56px;
            color: #c1cad3;
            margin-bottom: 14px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: #5b6773;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            color: #8a96a2;
        }

        @media (max-width: 680px) {
            .episode-mini {
                gap: 14px;
                padding: 12px 14px;
            }

            .episode-cover {
                width: 60px;
                height: 60px;
            }

            .episode-title {
                font-size: 15px;
            }

            .play-btn-icon {
                width: 42px;
                height: 42px;
                font-size: 14px;
            }

            .episode-details {
                padding: 0 14px 14px;
            }
        }

        @media (max-width: 680px) {
            .nav-links {
                justify-content: flex-start;
            }

            .search-box {
                flex-direction: column;
            }

            .search-box input {
                min-width: 0;
                width: 100%;
            }

            .search-btn {
                justify-content: center;
            }
        }

        /* 内联播放器进度条 */
        .episode-inline-player {
            padding: 0 20px 16px;
            display: none;
        }

        .episode-inline-player.active {
            display: block;
        }

        .inline-progress {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .inline-progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(var(--primary-rgb), 0.15);
            border-radius: 99px;
            cursor: pointer;
            position: relative;
            transition: height 0.15s ease;
        }

        .inline-progress-bar:hover {
            height: 6px;
        }

        .inline-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--deep));
            border-radius: 99px;
            position: relative;
            transition: width 0.1s linear;
        }

        .inline-progress-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 6px rgba(var(--primary-rgb), 0.4);
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .inline-progress-bar:hover .inline-progress-fill::after {
            opacity: 1;
        }

        .inline-time {
            font-size: 12px;
            color: var(--ink-soft);
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            min-width: 85px;
            text-align: right;
        }

        .episode-item.playing .play-btn-icon {
            background: linear-gradient(135deg, var(--deep), #1a2530);
        }

        .speed-btn {
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(var(--primary-rgb), 0.3);
            background: rgba(var(--primary-rgb), 0.08);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .speed-btn:hover {
            background: rgba(var(--primary-rgb), 0.18);
            border-color: var(--primary);
        }

        /* --- Deep Sea Glass Dark Theme --- */
        [data-theme='dark'] {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #000814;
            --gold: #c5b358;
            --ink: #FFFFFF;
            --ink-soft: #A0B3C6;
            --paper: #000814;
            --surface: rgba(0, 78, 140, 0.08);
            --line: rgba(0, 78, 140, 0.4);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        [data-theme='dark'] body {
            background: 
                radial-gradient(circle at 50% -20%, rgba(0, 78, 140, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 78, 140, 0.1) 0%, transparent 50%),
                var(--paper) !important;
            color: var(--ink) !important;
            position: relative;
        }

        [data-theme='dark'] body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 1000;
        }

        [data-theme='dark'] .top-nav {
            background: rgba(0, 8, 20, 0.8) !important;
            backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid var(--line);
        }

        [data-theme='dark'] .panel,
        [data-theme='dark'] .section,
        [data-theme='dark'] .article-card,
        [data-theme='dark'] .tool-card,
        [data-theme='dark'] .episode-card,
        [data-theme='dark'] .music-card,
        [data-theme='dark'] .music-player,
        [data-theme='dark'] .modal-content,
        [data-theme='dark'] .description,
        [data-theme='dark'] .episode-item,
        [data-theme='dark'] .software-card,
        [data-theme='dark'] .header,
        [data-theme='dark'] .podcast-shell,
        [data-theme='dark'] .episode-skeleton {
            background: var(--surface) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid var(--line) !important;
            box-shadow: var(--shadow) !important;
        }

        [data-theme='dark'] .search-box input {
            background: rgba(0, 78, 140, 0.1) !important;
            border: 1px solid var(--line) !important;
            color: var(--ink) !important;
        }

        [data-theme='dark'] .nav-links a {
            color: var(--ink-soft);
        }

        [data-theme='dark'] .nav-links a:hover,
        [data-theme='dark'] .nav-links a.active {
            color: #FFFFFF !important;
            background: var(--primary) !important;
            box-shadow: 0 0 20px rgba(0, 78, 140, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.3) !important;
        }

        [data-theme='dark'] .section-title,
        [data-theme='dark'] .name,
        [data-theme='dark'] .article-title,
        [data-theme='dark'] .header-title,
        [data-theme='dark'] .episode-title,
        [data-theme='dark'] .card-title,
        [data-theme='dark'] .wechat-id,
        [data-theme='dark'] .header h1,
        [data-theme='dark'] .modal-content h2 {
            color: #FFFFFF !important;
            font-weight: 700 !important;
            text-shadow: 0 0 10px rgba(0, 78, 140, 0.3);
        }

        [data-theme='dark'] .tag,
        [data-theme='dark'] .filter-btn,

    <script src="js/umami-config.js"></script>
    <script src="js/analytics.js"></script>
    <script>
        let allEpisodes = [];
        let filteredEpisodes = [];
        let currentFilter = 'all';
        let currentPlayer = null;

        // 苹果播客 ID（可根据需要修改）
        const APPLE_PODCAST_ID = '1825759955';

        // 初始加载
        window.addEventListener('DOMContentLoaded', function () {
            loadPodcasts();
        });

        // 加载所有播客数据
        async function loadPodcasts() {
            try {
                // 骨架屏已由 HTML 提供,直接开始加载数据

                // 加载苹果播客数据
                const appleEpisodes = await loadApplePodcasts();

                // 合并所有剧集
                allEpisodes = [...appleEpisodes];
                filteredEpisodes = [...allEpisodes];

                // 按日期排序（最新的优先）
                allEpisodes.sort((a, b) => new Date(b.date) - new Date(a.date));
                filteredEpisodes.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderEpisodes();
            } catch (error) {
                console.error('加载播客失败:', error);
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>加载失败</h3>
                        <p>无法获取播客数据，请检查网络连接或稍后重试</p>
                    </div>
                `;
            }
        }

        // 从苹果播客加载 (使用 JSONP 避免 CORS 问题)
        async function loadApplePodcasts() {
            return new Promise((resolve, reject) => {
                try {
                    // 创建唯一的回调函数名
                    const callbackName = 'applePodcastCallback_' + Date.now();

                    // 定义回调函数
                    window[callbackName] = function (data) {
                        // 清理
                        delete window[callbackName];
                        document.body.removeChild(script);

                        const results = data.results || [];
                        // 第一个结果是播客本身，后面才是剧集
                        const collection = results[0];
                        const collectionCover = collection ? (collection.artworkUrl100 || '') : '';
                        const episodes = results.slice(1);

                        // 将 100px 封面替换为 200px 版本（比 600px 小很多，但对 132px 显示足够清晰）
                        function optimizeCover(url) {
                            if (!url) return collectionCover;
                            return url.replace(/100x100/, '600x600');
                        }

                        const mappedEpisodes = episodes.map((ep, index) => ({
                            id: `apple_${index}`,
                            platform: 'apple',
                            platformName: '苹果播客',
                            title: ep.trackName || '未知标题',
                            description: ep.description || '暂无描述',
                            date: new Date(ep.releaseDate).toISOString().split('T')[0],
                            duration: formatDuration(Math.round((ep.trackTimeMillis || 0) / 1000)),
                            audioUrl: ep.episodeUrl || '',
                            coverUrl: optimizeCover(ep.artworkUrl100),
                            externalUrl: `https://podcasts.apple.com/cn/podcast/id${APPLE_PODCAST_ID}`
                        }));

                        resolve(mappedEpisodes);
                    };

                    // 创建 script 标签进行 JSONP 请求
                    const script = document.createElement('script');
                    script.src = `https://itunes.apple.com/lookup?id=${APPLE_PODCAST_ID}&country=CN&media=podcast&entity=podcastEpisode&limit=200&callback=${callbackName}`;
                    script.onerror = function () {
                        delete window[callbackName];
                        document.body.removeChild(script);
                        console.warn('苹果播客 JSONP 加载失败');
                        resolve([]);
                    };

                    // 设置超时
                    setTimeout(() => {
                        if (window[callbackName]) {
                            delete window[callbackName];
                            if (script.parentNode) {
                                document.body.removeChild(script);
                            }
                            console.warn('苹果播客加载超时');
                            resolve([]);
                        }
                    }, 10000);

                    document.body.appendChild(script);
                } catch (error) {
                    console.warn('苹果播客加载失败:', error);
                    resolve([]);
                }
            });
        }

        // 格式化时长（秒 -> HH:MM:SS）
        function formatDuration(seconds) {
            if (!seconds || seconds === 0) return '未知';
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            if (hours > 0) {
                return `${hours}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }
            return `${minutes}:${String(secs).padStart(2, '0')}`;
        }

        // 过滤播客平台
        function filterByPlatform(platform) {
            currentFilter = platform;
            trackEvent('podcast_filter_click', { platform: platform });
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            if (typeof event !== 'undefined' && event.target && event.target.closest('.filter-tab')) {
                event.target.closest('.filter-tab').classList.add('active');
            }

            if (platform === 'all') {
                filteredEpisodes = [...allEpisodes];
            } else {
                filteredEpisodes = allEpisodes.filter(ep => ep.platform === platform);
            }
            renderEpisodes();
        }

        // 搜索
        function performSearch() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (keyword) {
                filteredEpisodes = allEpisodes.filter(ep => {
                    const matchFilter = currentFilter === 'all' || ep.platform === currentFilter;
                    const matchKeyword = ep.title.toLowerCase().includes(keyword) ||
                        ep.description.toLowerCase().includes(keyword);
                    return matchFilter && matchKeyword;
                });
            } else {
                if (currentFilter === 'all') {
                    filteredEpisodes = [...allEpisodes];
                } else {
                    filteredEpisodes = allEpisodes.filter(ep => ep.platform === currentFilter);
                }
            }
            renderEpisodes();
            trackEvent('podcast_search', {
                keyword: keyword || 'all',
                filter: currentFilter,
                result_count: filteredEpisodes.length
            });
        }

        // 回车键搜索
        window.addEventListener('DOMContentLoaded', function () {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        performSearch();
                    }
                });
            }
        });

        // 渲染剧集列表
        // 渲染剧集列表
        function renderEpisodes() {
            const contentArea = document.getElementById('contentArea');

            if (filteredEpisodes.length === 0) {
                contentArea.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>未找到匹配的节目</h3>
                        <p>请尝试其他搜索关键词或过滤条件</p>
                    </div>
                `;
                return;
            }

            const episodesHTML = filteredEpisodes.map((ep, index) => `
                <div class="episode-item" id="episode-${index}">
                    <div class="episode-mini" onclick="toggleShowNotes(${index})">
                        <img src="${ep.coverUrl}" class="episode-cover" alt="封面" loading="lazy" decoding="async" onerror="this.src='images/article-placeholder.svg'">
                        <div class="episode-info">
                            <div class="episode-title">${ep.title}</div>
                            <div class="episode-meta">
                                <span>${formatDate(ep.date)}</span>
                                <span>•</span>
                                <span>${ep.duration}</span>
                            </div>
                        </div>
                        <div class="play-btn-icon" id="playBtn-${index}" onclick="event.stopPropagation(); playEpisode(${index})">
                            <i class="fas fa-play"></i>
                        </div>
                    </div>
                    <div class="episode-inline-player" id="inlinePlayer-${index}">
                        <div class="inline-progress">
                            <div class="inline-progress-bar" id="progressBar-${index}" onclick="event.stopPropagation(); seekEpisode(event, ${index})">
                                <div class="inline-progress-fill" id="progressFill-${index}" style="width: 0%"></div>
                            </div>
                            <button class="speed-btn" id="speedBtn-${index}" onclick="event.stopPropagation(); toggleSpeed(${index})">1x</button>
                            <span class="inline-time" id="timeDisplay-${index}">0:00 / 0:00</span>
                        </div>
                    </div>
                    <div class="episode-details" id="details-${index}">
                        <div class="episode-description" id="desc-${index}">${ep.description}</div>
                        <span class="collapse-link" id="collapse-${index}" onclick="event.stopPropagation(); toggleShowNotes(${index})">收起</span>
                    </div>
                </div>
            `).join('');

            contentArea.innerHTML = `<div class="episodes-list">${episodesHTML}</div>`;

            // 如果当前有正在播放的节目，恢复其状态
            if (currentPlayingIndex !== -1 && audioEl && !audioEl.paused) {
                const epItem = document.getElementById(`episode-${currentPlayingIndex}`);
                const inlinePlayer = document.getElementById(`inlinePlayer-${currentPlayingIndex}`);
                const playBtn = document.getElementById(`playBtn-${currentPlayingIndex}`);
                if (epItem) epItem.classList.add('playing');
                if (inlinePlayer) inlinePlayer.classList.add('active');
                if (playBtn) playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                const speedBtn = document.getElementById(`speedBtn-${currentPlayingIndex}`);
                if (speedBtn) speedBtn.textContent = currentSpeed === 1 ? '1x' : currentSpeed + 'x';
            }
        }

        // 展开/收起摘要
        function toggleShowNotes(index) {
            const detailsEl = document.getElementById(`details-${index}`);

            if (detailsEl) {
                const isShown = detailsEl.classList.contains('show');
                if (isShown) {
                    detailsEl.classList.remove('show');
                } else {
                    detailsEl.classList.add('show');
                }
            }
        }

        // 音频播放器
        let audioEl = null;
        let currentPlayingIndex = -1;
        let progressTimer = null;
        const SPEED_OPTIONS = [1, 1.25, 1.5, 1.75, 2];
        let currentSpeed = 1;

        function toggleSpeed(index) {
            const idx = SPEED_OPTIONS.indexOf(currentSpeed);
            currentSpeed = SPEED_OPTIONS[(idx + 1) % SPEED_OPTIONS.length];
            if (audioEl) {
                audioEl.playbackRate = currentSpeed;
            }
            const btn = document.getElementById(`speedBtn-${index}`);
            if (btn) {
                btn.textContent = currentSpeed === 1 ? '1x' : currentSpeed + 'x';
            }
        }

        function formatTime(sec) {
            if (!sec || isNaN(sec)) return '0:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function updateInlineProgress() {
            if (!audioEl || currentPlayingIndex === -1) return;
            const fill = document.getElementById(`progressFill-${currentPlayingIndex}`);
            const timeDisp = document.getElementById(`timeDisplay-${currentPlayingIndex}`);
            if (fill && audioEl.duration) {
                const pct = (audioEl.currentTime / audioEl.duration) * 100;
                fill.style.width = pct + '%';
            }
            if (timeDisp) {
                timeDisp.textContent = `${formatTime(audioEl.currentTime)} / ${formatTime(audioEl.duration)}`;
            }
        }

        function seekEpisode(event, index) {
            if (!audioEl || currentPlayingIndex !== index) return;
            const bar = document.getElementById(`progressBar-${index}`);
            const rect = bar.getBoundingClientRect();
            const pct = (event.clientX - rect.left) / rect.width;
            if (audioEl.duration) {
                audioEl.currentTime = pct * audioEl.duration;
            }
        }

        function playEpisode(episodeIndex) {
            const episode = filteredEpisodes[episodeIndex];
            if (!episode) return;

            trackEvent('podcast_play_click', {
                episode_id: episode.id,
                platform: episode.platform
            });

            if (!episode.audioUrl) {
                console.warn('该剧集没有音频 URL:', episode.title);
                alert('该剧集暂无音频');
                return;
            }

            // 如果点击的是当前正在播放的节目，切换播放/暂停
            if (currentPlayingIndex === episodeIndex && audioEl) {
                if (audioEl.paused) {
                    audioEl.play();
                    document.getElementById(`playBtn-${episodeIndex}`).innerHTML = '<i class="fas fa-pause"></i>';
                    progressTimer = setInterval(updateInlineProgress, 250);
                } else {
                    audioEl.pause();
                    document.getElementById(`playBtn-${episodeIndex}`).innerHTML = '<i class="fas fa-play"></i>';
                    clearInterval(progressTimer);
                }
                return;
            }

            // 停止之前的播放
            if (audioEl) {
                audioEl.pause();
                clearInterval(progressTimer);
                // 重置之前的 UI
                const prevItem = document.getElementById(`episode-${currentPlayingIndex}`);
                const prevInline = document.getElementById(`inlinePlayer-${currentPlayingIndex}`);
                const prevBtn = document.getElementById(`playBtn-${currentPlayingIndex}`);
                if (prevItem) prevItem.classList.remove('playing');
                if (prevInline) prevInline.classList.remove('active');
                if (prevBtn) prevBtn.innerHTML = '<i class="fas fa-play"></i>';
            }

            // 创建新的音频元素
            audioEl = new Audio(episode.audioUrl);
            audioEl.playbackRate = currentSpeed;
            currentPlayingIndex = episodeIndex;

            // 显示内联播放器
            const epItem = document.getElementById(`episode-${episodeIndex}`);
            const inlinePlayer = document.getElementById(`inlinePlayer-${episodeIndex}`);
            const playBtn = document.getElementById(`playBtn-${episodeIndex}`);
            const speedBtn = document.getElementById(`speedBtn-${episodeIndex}`);

            if (epItem) epItem.classList.add('playing');
            if (inlinePlayer) inlinePlayer.classList.add('active');
            if (playBtn) playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            if (speedBtn) speedBtn.textContent = currentSpeed === 1 ? '1x' : currentSpeed + 'x';

            audioEl.play().catch(err => {
                console.warn('播放失败:', err);
            });

            progressTimer = setInterval(updateInlineProgress, 250);

            audioEl.addEventListener('ended', function () {
                clearInterval(progressTimer);
                if (playBtn) playBtn.innerHTML = '<i class="fas fa-play"></i>';
                const fill = document.getElementById(`progressFill-${episodeIndex}`);
                if (fill) fill.style.width = '0%';
                const timeDisp = document.getElementById(`timeDisplay-${episodeIndex}`);
                if (timeDisp) timeDisp.textContent = `0:00 / ${formatTime(audioEl.duration)}`;
            });
        }

        // 日期格式化
        function formatDate(dateString) {
            const date = new Date(dateString);
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('zh-CN', options);
        }
    </script>
