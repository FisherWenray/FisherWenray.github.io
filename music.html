<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放 - 文鳐夜飞</title>
    <meta name="description" content="文鳐夜飞的原创音乐作品，分享关于生命、成长和情感的独立音乐创作。">
    <meta property="og:title" content="音乐播放 - 文鳐夜飞">
    <meta property="og:description" content="文鳐夜飞的原创音乐作品，分享关于生命、成长和情感的独立音乐创作。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://wenyaoyefei.com/music.html">
    <meta property="og:image" content="https://wenyaoyefei.com/avatar.jpg">
    <script src="js/theme.js"></script>
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 预连接 API 和 CDN 域名，减少 DNS/TLS 延迟 -->
    <link rel="preconnect" href="https://api.i-meto.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://p3.music.126.net">
    <link rel="dns-prefetch" href="https://m801.music.126.net">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- 引入 APlayer -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>

    <style>
        :root {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #2A3645;
            --gold: #c5b358;
            --ink: #273039;
            --ink-soft: #5f6a75;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.86);
            --line: rgba(0, 78, 140, 0.22);
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 20px 44px rgba(28, 39, 50, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
            scrollbar-gutter: stable;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 120;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .theme-toggle {
            background: rgba(var(--primary-rgb), 0.08);
            border: 1px solid var(--line);
            color: var(--primary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: #fff;
            transform: rotate(30deg);
        }

        [data-theme='dark'] .theme-toggle {
            color: var(--gold);
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            list-style: none;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 0;
            width: 80px;
            text-align: center;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .container {
            width: min(1200px, 94vw);
            margin: 28px auto 34px;
        }

        .header {
            padding: clamp(26px, 4vw, 44px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            text-align: center;
        }

        .header-title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(32px, 4.4vw, 52px);
            color: var(--primary);
            margin-bottom: 10px;
            letter-spacing: 0.8px;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            width: 100%;
        }

        .header-subtitle {
            color: var(--ink-soft);
            font-size: clamp(14px, 1.8vw, 16px);
            line-height: 1.6;
            margin-bottom: 0;
            text-align: center;
        }

        .music-platforms {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .platform-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(var(--primary-rgb), 0.05);
            border: 1px solid rgba(var(--primary-rgb), 0.15);
            border-radius: 999px;
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            font-weight: 600;
        }

        .music-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            padding: clamp(16px, 3vw, 26px);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 迷你播放器（默认模式） */
        .mini-player {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 16px 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(244, 246, 248, 0.7) 100%);
            border-radius: var(--radius-md);
            border: 1px solid rgba(0, 78, 140, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mini-player:hover {
            border-color: rgba(0, 78, 140, 0.3);
            box-shadow: 0 4px 12px rgba(0, 78, 140, 0.1);
        }

        .mini-cover {
            width: 72px;
            height: 72px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 12px rgba(42, 54, 69, 0.12);
            flex-shrink: 0;
        }

        .mini-info {
            flex: 1;
            min-width: 0;
        }

        .mini-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .mini-artist {
            font-size: 14px;
            color: var(--ink-soft);
        }

        .mini-play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--deep));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 4px 12px rgba(0, 78, 140, 0.3);
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .mini-play-btn:hover {
            transform: scale(1.08);
        }

        .mini-play-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* 展开后的完整播放器 */
        .custom-player {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(244, 246, 248, 0.7) 100%);
            border-radius: var(--radius-md);
            border: 1px solid rgba(0, 78, 140, 0.15);
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
            margin-top: 0;
            margin-bottom: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-player.expanded {
            max-height: 500px;
            opacity: 1;
            padding: 20px;
            margin-top: 12px;
            margin-bottom: 12px;
        }

        /* 歌曲信息区域 */
        .player-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .player-cover {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 8px 24px rgba(42, 54, 69, 0.15);
            flex-shrink: 0;
        }

        .player-details {
            flex: 1;
            min-width: 0;
        }

        .player-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-artist {
            font-size: 14px;
            color: var(--ink-soft);
        }

        /* 进度条区域 */
        .player-progress {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-bar-wrapper {
            position: relative;
            height: 6px;
            background: rgba(0, 78, 140, 0.12);
            border-radius: 3px;
            cursor: pointer;
            overflow: visible;
        }

        .progress-bar-wrapper:hover {
            height: 8px;
        }

        .progress-bar-wrapper:hover .progress-thumb {
            opacity: 1;
            transform: translateY(-50%) scale(1);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--deep) 100%);
            border-radius: 3px;
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-thumb {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 78, 140, 0.4);
            opacity: 0;
            transition: all 0.2s ease;
        }

        .progress-time {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--ink-soft);
            font-family: 'JetBrains Mono', monospace;
        }

        /* 控制按钮区域 */
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .control-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--ink-soft);
            transition: all 0.25s ease;
            padding: 8px;
        }

        .control-btn:hover {
            color: var(--primary);
            transform: scale(1.1);
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .control-btn.play-btn {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--deep));
            border-radius: 50%;
            color: #fff;
            box-shadow: 0 8px 20px rgba(0, 78, 140, 0.35);
        }

        .control-btn.play-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 28px rgba(0, 78, 140, 0.45);
        }

        .control-btn.play-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* 歌词区域 */
        .player-lyrics {
            height: 80px;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .lyrics-container {
            position: absolute;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .lyrics-line {
            font-size: 14px;
            color: var(--ink-soft);
            padding: 6px 0;
            transition: all 0.3s ease;
            line-height: 1.5;
        }

        .lyrics-line.active {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            transform: scale(1.05);
        }

        .lyrics-empty {
            font-size: 13px;
            color: #a8b3be;
            font-style: italic;
        }

        /* 骨架屏 */
        .player-skeleton {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(244, 246, 248, 0.7) 100%);
            border-radius: var(--radius-md);
            border: 1px solid rgba(0, 78, 140, 0.15);
        }

        .skeleton-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .skeleton-cover {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            background: linear-gradient(110deg, #e8ecf0 30%, #f4f6f8 50%, #e8ecf0 70%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.4s ease-in-out infinite;
            flex-shrink: 0;
        }

        .skeleton-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .skeleton-line {
            height: 14px;
            border-radius: 7px;
            background: linear-gradient(110deg, #e8ecf0 30%, #f4f6f8 50%, #e8ecf0 70%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.4s ease-in-out infinite;
        }

        .skeleton-title {
            width: 70%;
        }

        .skeleton-artist {
            width: 40%;
        }

        .skeleton-progress {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(110deg, #e8ecf0 30%, #f4f6f8 50%, #e8ecf0 70%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.4s ease-in-out infinite;
        }

        .skeleton-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .skeleton-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(110deg, #e8ecf0 30%, #f4f6f8 50%, #e8ecf0 70%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.4s ease-in-out infinite;
        }

        /* 隐藏原始 APlayer */
        #aplayer {
            display: none;
        }

        .music-hint {
            text-align: center;
            font-size: 13px;
            color: var(--ink-soft);
            margin-top: 10px;
        }

        @keyframes skeleton-pulse {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .footer {
            width: min(1200px, 94vw);
            margin: 40px auto 34px;
            text-align: center;
            font-size: 13px;
            color: #85909b;
            border-top: 1px solid var(--line);
            padding-top: 30px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .footer-links .link-label {
            color: var(--primary);
            font-weight: 700;
            margin-right: 4px;
        }

        .music-platforms {
            display: flex;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        .platform-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: rgba(var(--primary-rgb), 0.05);
            border: 1px solid rgba(var(--primary-rgb), 0.15);
            border-radius: 999px;
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            font-weight: 600;
        }

        .platform-link i {
            font-size: 16px;
        }

        .platform-link:hover {
            transform: translateY(-2px);
            background: var(--primary);
            color: #fff !important;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(var(--primary-rgb), 0.25);
        }

        .platform-link.netease:hover {
            background: #e60026 !important;
            box-shadow: 0 8px 20px rgba(230, 0, 38, 0.3);
        }

        [data-theme='dark'] .platform-link {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--ink-soft);
        }

        [data-theme='dark'] .platform-link:hover {
            color: #fff !important;
        }

        @media (max-width: 680px) {
            .header-subtitle {
                font-size: 13px;
            }
            .platform-link {
                font-size: 12px;
                padding: 4px 10px;
            }
            .nav-links {
                justify-content: flex-start;
            }

            .container {
                margin-top: 15px;
            }
        }

        /* --- Deep Sea Glass Dark Theme --- */
        [data-theme='dark'] {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #000814;
            --gold: #c5b358;
            --ink: #FFFFFF;
            --ink-soft: #A0B3C6;
            --paper: #000814;
            --surface: rgba(0, 78, 140, 0.08);
            --line: rgba(0, 78, 140, 0.4);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        [data-theme='dark'] body {
            background: 
                radial-gradient(circle at 50% -20%, rgba(0, 78, 140, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 78, 140, 0.1) 0%, transparent 50%),
                var(--paper) !important;
            color: var(--ink) !important;
            position: relative;
        }

        [data-theme='dark'] body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 1000;
        }

        [data-theme='dark'] .top-nav {
            background: rgba(0, 8, 20, 0.8) !important;
            backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid var(--line);
        }

        [data-theme='dark'] .panel,
        [data-theme='dark'] .section,
        [data-theme='dark'] .article-card,
        [data-theme='dark'] .tool-card,
        [data-theme='dark'] .episode-card,
        [data-theme='dark'] .music-card,
        [data-theme='dark'] .music-player,
        [data-theme='dark'] .modal-content,
        [data-theme='dark'] .description,
        [data-theme='dark'] .episode-item,
        [data-theme='dark'] .software-card,
        [data-theme='dark'] .header,
        [data-theme='dark'] .mini-player,
        [data-theme='dark'] .custom-player,
        [data-theme='dark'] .player-skeleton {
            background: var(--surface) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid var(--line) !important;
            box-shadow: var(--shadow) !important;
        }

        [data-theme='dark'] .nav-links a {
            color: var(--ink-soft);
        }

        [data-theme='dark'] .nav-links a:hover,
        [data-theme='dark'] .nav-links a.active {
            color: #FFFFFF !important;
            background: var(--primary) !important;
            box-shadow: 0 0 20px rgba(0, 78, 140, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.3) !important;
        }

        [data-theme='dark'] .section-title,
        [data-theme='dark'] .name,
        [data-theme='dark'] .article-title,
        [data-theme='dark'] .header-title,
        [data-theme='dark'] .episode-title,
        [data-theme='dark'] .card-title,
        [data-theme='dark'] .wechat-id,
        [data-theme='dark'] .modal-content h2 {
            color: #FFFFFF !important;
            font-weight: 700 !important;
            text-shadow: 0 0 10px rgba(0, 78, 140, 0.3);
        }

        [data-theme='dark'] .tag,
        [data-theme='dark'] .filter-btn,
        [data-theme='dark'] .article-tag {
            color: var(--ink-soft) !important;
            border: 1px solid var(--line) !important;
            background: rgba(0, 78, 140, 0.1) !important;
        }

        [data-theme='dark'] .tag:hover,
        [data-theme='dark'] .filter-btn:hover,
        [data-theme='dark'] .filter-btn.active {
            background: var(--primary) !important;
            color: #FFFFFF !important;
            box-shadow: 0 0 15px rgba(0, 78, 140, 0.4) !important;
        }

                        </div>
                        <div
                            style="height: 14px; border-radius: 7px; background: linear-gradient(110deg, #e8ecf0 30%, #f4f6f8 50%, #e8ecf0 70%); background-size: 200% 100%; animation: skeleton-pulse 1.4s ease-in-out infinite; width: 40%;">
                        </div>

            <!-- 展开后的完整播放器 -->
            <div id="expandedPlayer" class="custom-player">
            </div>

            <div id="aplayer" style="display: none;"></div>

            <div style="display: flex; flex-direction: column; align-items: center; gap: 14px; margin-top: 10px;">

                data-umami-props='{"site":"muimi.club", "from":"footer"}'>

    <script src="js/umami-config.js"></script>
    <script src="js/analytics.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initPlayer();
        });

        async function initPlayer() {
            const SONG_ID = '3353644885';
            let ap = null;
            let currentLrc = [];
            let isPlaying = false;
            let isExpanded = false;
            let currentSong = null;

            function parseLrc(lrcText) {
                const lines = lrcText.split('\n');
                const result = [];
                const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;

                for (const line of lines) {
                    const match = line.match(timeRegex);
                    if (match) {
                        const minutes = parseInt(match[1]);
                        const seconds = parseInt(match[2]);
                        const milliseconds = parseInt(match[3].padEnd(3, '0'));
                        const time = minutes * 60 + seconds + milliseconds / 1000;
                        const text = line.replace(timeRegex, '').trim();
                        if (text) {
                            result.push({ time, text });
                        }
                    }
                }
                return result.sort((a, b) => a.time - b.time);
            }

            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            function renderMiniPlayer(song) {
                const miniPlayer = document.getElementById('miniPlayer');
                miniPlayer.className = 'mini-player';
                miniPlayer.innerHTML = `
                    <img src="${song.pic}" class="mini-cover" alt="封面" onerror="this.style.background='linear-gradient(135deg,var(--primary),var(--deep))';this.style.visibility='hidden'">
                    <div class="mini-info">
                        <div class="mini-title">${song.title}</div>
                        <div class="mini-artist">${song.author}</div>
                    </div>
                    <button class="mini-play-btn" id="miniPlayBtn">
                        <svg viewBox="0 0 24 24" id="miniPlayIcon"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                `;

                // 点击播放按钮：展开播放器并播放
                document.getElementById('miniPlayBtn').addEventListener('click', function (e) {
                    e.stopPropagation();
                    if (!isExpanded) {
                        expandPlayer();
                    }
                    togglePlay();
                });

                // 点击迷你播放器区域：切换展开/收起
                miniPlayer.addEventListener('click', function () {
                    if (!isExpanded) {
                        expandPlayer();
                    } else {
                        collapsePlayer();
                    }
                });
            }

            function expandPlayer() {
                if (!currentSong) return;
                isExpanded = true;
                const expandedPlayer = document.getElementById('expandedPlayer');
                expandedPlayer.className = 'custom-player expanded';
                expandedPlayer.innerHTML = `
                    <div class="player-progress">
                        <div class="progress-bar-wrapper" id="progressBar">
                            <div class="progress-fill" id="progressFill" style="width: 0%">
                                <div class="progress-thumb"></div>
                            </div>
                        </div>
                        <div class="progress-time">
                            <span id="currentTime">0:00</span>
                            <span id="totalTime">0:00</span>
                        </div>
                    </div>
                    
                    <div class="player-lyrics">
                        <div class="lyrics-container" id="lyricsContainer">
                            ${currentLrc.length > 0
                        ? currentLrc.map((line, index) => `<div class="lyrics-line" data-index="${index}">${line.text}</div>`).join('')
                        : '<div class="lyrics-empty">暂无歌词</div>'
                    }
                        </div>
                    </div>
                `;

                if (ap) {
                    document.getElementById('totalTime').textContent = formatTime(ap.audio.duration || 0);
                    document.getElementById('progressBar').addEventListener('click', seekTo);

                    // 使用事件驱动更新播放状态
                    ap.on('play', function () {
                        isPlaying = true;
                        updatePlayButton();
                    });

                    ap.on('pause', function () {
                        isPlaying = false;
                        updatePlayButton();
                    });

                    ap.on('timeupdate', function () {
                        if (!isExpanded) return;
                        const progressFill = document.getElementById('progressFill');
                        const currentTimeEl = document.getElementById('currentTime');
                        if (progressFill && currentTimeEl) {
                            const percent = (ap.audio.currentTime / ap.audio.duration) * 100;
                            progressFill.style.width = percent + '%';
                            currentTimeEl.textContent = formatTime(ap.audio.currentTime);
                            updateLyrics(ap.audio.currentTime);
                        }
                    });

                    ap.on('ended', function () {
                        isPlaying = false;
                        updatePlayButton();
                    });
                }

                updatePlayButton();
            }

            function collapsePlayer() {
                isExpanded = false;
                const expandedPlayer = document.getElementById('expandedPlayer');
                expandedPlayer.className = 'custom-player';
            }

            function togglePlay() {
                if (!ap) return;
                if (isPlaying) {
                    ap.pause();
                } else {
                    ap.play();
                }
                // 状态由 APlayer 的 play/pause 事件驱动更新
            }

            function updatePlayButton() {
                if (isExpanded) {
                    const icon = document.getElementById('playIcon');
                    if (icon) {
                        icon.innerHTML = isPlaying
                            ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
                            : '<path d="M8 5v14l11-7z"/>';
                    }
                }

                const miniIcon = document.getElementById('miniPlayIcon');
                if (miniIcon) {
                    miniIcon.innerHTML = isPlaying
                        ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
                        : '<path d="M8 5v14l11-7z"/>';
                }

                // 不再自动收起，让用户手动点击迷你播放器区域来收起
            }

            function seekTo(e) {
                if (!ap) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                ap.seek(ap.audio.duration * percent);
            }

            function updateLyrics(currentTime) {
                if (currentLrc.length === 0 || !isExpanded) return;

                let activeIndex = 0;
                for (let i = 0; i < currentLrc.length; i++) {
                    if (currentTime >= currentLrc[i].time) {
                        activeIndex = i;
                    }
                }

                const container = document.getElementById('lyricsContainer');
                if (!container) return;

                const lines = currentLrc.map((line, index) =>
                    `<div class="lyrics-line ${index === activeIndex ? 'active' : ''}" data-index="${index}">${line.text}</div>`
                ).join('');
                container.innerHTML = lines;

                const activeLine = container.querySelector('.lyrics-line.active');
                if (activeLine) {
                    const containerHeight = container.parentElement.offsetHeight;
                    const lineTop = activeLine.offsetTop;
                    const lineHeight = activeLine.offsetHeight;
                    container.style.transform = `translateY(${containerHeight / 2 - lineTop - lineHeight / 2}px)`;
                }
            }

            // 默认歌曲数据（当 API 不可用时的备选）
            const DEFAULT_SONG = {
                title: '何日君再来(纪念黄家驹)',
                author: '文鳐夜飞',
                pic: 'https://p3.music.126.net/dtukTMTyX1sfFN1TQk0tRw==/109951172805582410.jpg',
                // 直接使用网易云音乐的播放地址
                url: `https://music.163.com/song/media/outer/url?id=${SONG_ID}.mp3`,
                lrc: ''
            };

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);

                let songList;
                try {
                    const infoResponse = await fetch(`https://api.i-meto.com/meting/api?server=netease&type=song&id=${SONG_ID}`, {
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    if (!infoResponse.ok) {
                        throw new Error('Network response was not ok');
                    }
                    songList = await infoResponse.json();
                } catch (fetchError) {
                    console.warn('API请求失败，使用默认歌曲数据:', fetchError);
                    songList = [DEFAULT_SONG];
                }

                if (!songList || songList.length === 0) {
                    songList = [DEFAULT_SONG];
                }
                const song = songList[0];
                currentSong = song;

                // 保留 API 返回的 pic 代理地址（带 auth 参数，可正常加载）
                // 仅在没有封面时使用默认封面
                if (!song.pic) {
                    song.pic = DEFAULT_SONG.pic;
                }

                // 立即渲染迷你播放器（不等待音频加载）
                renderMiniPlayer(song);
                document.getElementById('musicHint').innerHTML = '<i class="fas fa-music"></i> 点击播放按钮展开播放器';

                // 异步加载歌词（不阻塞播放器渲染）
                let lrcText = '';
                if (song.lrc) {
                    try {
                        const lrcController = new AbortController();
                        const lrcTimeout = setTimeout(() => lrcController.abort(), 5000);
                        const lrcResponse = await fetch(song.lrc, { signal: lrcController.signal });
                        clearTimeout(lrcTimeout);
                        if (lrcResponse.ok) {
                            lrcText = await lrcResponse.text();
                        }
                    } catch (e) {
                        console.warn('歌词加载失败:', e);
                        lrcText = '';
                    }
                }
                currentLrc = parseLrc(lrcText);

                // 构建音频 URL 列表（优先使用直接链接）
                const directUrl = `https://music.163.com/song/media/outer/url?id=${SONG_ID}.mp3`;
                let audioUrl = directUrl;
                // 如果 API 返回了 URL 且不是 Meting 代理地址，也可以尝试使用
                if (song.url && !song.url.includes('api.i-meto.com')) {
                    audioUrl = song.url;
                }

                ap = new APlayer({
                    container: document.getElementById('aplayer'),
                    theme: '#004E8C',
                    autoplay: false,
                    loop: 'all',
                    preload: 'metadata',
                    lrcType: 0,
                    audio: [{
                        name: song.title,
                        artist: song.author,
                        url: audioUrl,
                        cover: song.pic,
                        lrc: ''
                    }]
                });

                let audioReady = false;

                ap.on('canplay', function () {
                    audioReady = true;
                });

                // 音频加载失败时，尝试备用 URL
                ap.on('error', function () {
                    console.warn('音频加载失败，尝试备用地址...');
                    if (!audioReady && audioUrl !== directUrl) {
                        // 切换到直接链接重试
                        ap.list.switch(0);
                        ap.list.audios[0].url = directUrl;
                        ap.audio.src = directUrl;
                        ap.audio.load();
                    } else {
                        document.getElementById('musicHint').innerHTML = '<i class="fas fa-exclamation-circle"></i> 音频加载失败，该歌曲可能需要网易云音乐客户端播放';
                    }
                });

            } catch (err) {
                console.error('播放器初始化失败:', err);
                // 即使出错也显示歌曲信息
                currentSong = DEFAULT_SONG;
                renderMiniPlayer(DEFAULT_SONG);
                document.getElementById('musicHint').innerHTML = '<i class="fas fa-exclamation-circle"></i> 播放器加载失败: ' + err.message;
            }
        }
    </script>
