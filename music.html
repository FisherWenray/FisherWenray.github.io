<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放 - 文鳐夜飞</title>
    <link rel="icon" type="image/jpeg" href="微信图片_2026-01-23_124826_064.jpg">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>

    <style>
        :root {
            --primary: #5D7B93;
            --primary-rgb: 93, 123, 147;
            --deep: #2A3645;
            --gold: #c5b358;
            --ink: #273039;
            --ink-soft: #5f6a75;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.86);
            --line: rgba(93, 123, 147, 0.22);
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 20px 44px rgba(28, 39, 50, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
            scrollbar-gutter: stable;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 120;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            list-style: none;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 0;
            width: 80px;
            text-align: center;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .container {
            width: min(800px, 94vw);
            margin: 40px auto 60px;
        }

        .header {
            padding: clamp(26px, 4vw, 44px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            text-align: center;
        }

        .header-title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(32px, 4.4vw, 52px);
            color: var(--primary);
            margin-bottom: 10px;
            letter-spacing: 0.8px;
        }

        .header-subtitle {
            color: var(--ink-soft);
            font-size: clamp(14px, 1.8vw, 18px);
            line-height: 1.8;
        }

        .music-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 自定义 APlayer 样式 */
        .aplayer {
            border-radius: var(--radius-md) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08) !important;
            border: 1px solid var(--line) !important;
            background: rgba(255, 255, 255, 0.95) !important;
        }

        .aplayer .aplayer-info {
            padding: 14px 15px !important;
        }

        /* 修复播放/暂停按钮在封面上的定位 */
        .aplayer .aplayer-pic {
            position: relative !important;
        }

        .aplayer .aplayer-pic .aplayer-button {
            position: absolute !important;
            top: 50% !important;
            left: 50% !important;
            right: auto !important;
            bottom: auto !important;
            transform: translate(-50%, -50%) !important;
            margin: 0 !important;
        }

        /* 歌词区域始终显示 */
        .aplayer .aplayer-lrc {
            display: block !important;
            padding: 10px 0 !important;
            height: 120px !important;
            margin: 0 !important;
        }

        .aplayer .aplayer-lrc:before,
        .aplayer .aplayer-lrc:after {
            display: none !important;
        }

        .aplayer .aplayer-lrc p {
            font-size: 13px !important;
            color: var(--ink-soft) !important;
            transition: all 0.3s ease !important;
        }

        .aplayer .aplayer-lrc p.aplayer-lrc-current {
            color: var(--primary) !important;
            font-weight: 700 !important;
            font-size: 15px !important;
        }

        .music-hint {
            text-align: center;
            font-size: 13px;
            color: var(--ink-soft);
            margin-top: 10px;
        }

        /* 骨架屏加载动画 */
        .aplayer-skeleton {
            display: flex;
            align-items: center;
            padding: 12px;
            gap: 12px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid var(--line);
        }

        .skeleton-cover {
            width: 66px;
            height: 66px;
            border-radius: 6px;
            background: linear-gradient(110deg, #e8ecf0 30%, #f4f6f8 50%, #e8ecf0 70%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.4s ease-in-out infinite;
            flex-shrink: 0;
        }

        .skeleton-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(110deg, #e8ecf0 30%, #f4f6f8 50%, #e8ecf0 70%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.4s ease-in-out infinite;
        }

        .skeleton-title {
            width: 60%;
        }

        .skeleton-artist {
            width: 35%;
        }

        .skeleton-bar {
            width: 100%;
            height: 4px;
            margin-top: 6px;
        }

        @keyframes skeleton-pulse {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .footer {
            width: min(1200px, 94vw);
            margin: 40px auto 34px;
            text-align: center;
            font-size: 13px;
            color: #85909b;
            border-top: 1px solid var(--line);
            padding-top: 30px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .footer-links .link-label {
            color: var(--primary);
            font-weight: 700;
            margin-right: 4px;
        }

        @media (max-width: 680px) {
            .nav-links {
                justify-content: flex-start;
            }

            .container {
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="articles.html">文章</a></li>
                <li><a href="podcast.html">播客</a></li>
                <li><a href="software.html">产品</a></li>
                <li><a href="music.html" class="active">音乐</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1 class="header-title">🎵 原创AI音乐</h1>
            <p class="header-subtitle">Follow Heart，在旋律中寻找自由</p>
        </div>

        <div class="music-card">
            <div id="aplayer">
                <!-- 加载骨架屏 -->
                <div class="aplayer-skeleton">
                    <div class="skeleton-cover"></div>
                    <div class="skeleton-info">
                        <div class="skeleton-line skeleton-title"></div>

                </div>
            </div>

                <i class="fas fa-music"></i> 点击播放即可查看实时滚动歌词

    <div class="footer">
        <div class="footer-links">
            <span class="link-label">友情链接</span>
            <a href="https://muimi.club" target="_blank" rel="noopener" data-umami-event="friend_link_click"
                data-umami-props='{"site":"muimi.club", "from":"footer"}'>
                <i class="fas fa-link"></i>
                <span>Muimi Club</span>
            </a>
        </div>
        <p>© 2026 文鳐夜飞 | Made with ❤️ | 全网同名</p>
    </div>

    <script src="js/umami-config.js"></script>
    <script src="js/analytics.js"></script>
    <script>
        // 手动初始化 APlayer，从 Meting API 获取歌曲信息和歌词
        (async function () {
            const METING_API = 'https://api.i-meto.com/meting/api';
            const SONG_ID = '3353644885';

            try {
                // 1. 并行获取歌曲信息和歌词（比串行快一倍）
                const infoPromise = fetch(`${METING_API}?server=netease&type=song&id=${SONG_ID}`).then(r => r.json());
                // 预先构造歌词URL（Meting API的歌词URL格式是固定的）
                const lrcPromise = fetch(`${METING_API}?server=netease&type=lrc&id=${SONG_ID}`).then(r => r.text()).catch(() => '[00:00.00]暂无歌词');

                const [songList, lrcText] = await Promise.all([infoPromise, lrcPromise]);

                if (!songList || songList.length === 0) {
                    document.getElementById('aplayer').innerHTML = '<p style="text-align:center;padding:20px;color:#999;">歌曲信息加载失败</p>';
                    return;
                }
                const song = songList[0];

                // 2. 初始化 APlayer
                const ap = new APlayer({
                    container: document.getElementById('aplayer'),
                    theme: '#5D7B93',
                    autoplay: false,
                    loop: 'all',
                    preload: 'metadata',
                    lrcType: 1,
                    audio: [{
                        name: song.title,
                        artist: song.author,
                        url: song.url,
                        cover: song.pic,
                        lrc: lrcText
                    }]
                });

            } catch (err) {
                console.error('播放器初始化失败:', err);
                document.getElementById('aplayer').innerHTML = '<p style="text-align:center;padding:20px;color:#999;">播放器加载失败，请刷新重试</p>';
            }
        })();
    </script>
</body>
