<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放 - 文鳐夜飞</title>
    <link rel="icon" type="image/jpeg" href="微信图片_2026-01-23_124826_064.jpg">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- 引入 APlayer 和 MetingJS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/meting@2.0.1/dist/Meting.min.js"></script>

    <style>
        :root {
            --primary: #5D7B93;
            --primary-rgb: 93, 123, 147;
            --deep: #2A3645;
            --gold: #c5b358;
            --ink: #273039;
            --ink-soft: #5f6a75;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.86);
            --line: rgba(93, 123, 147, 0.22);
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 20px 44px rgba(28, 39, 50, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
            scrollbar-gutter: stable;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 120;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            list-style: none;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 0;
            width: 80px;
            text-align: center;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .container {
            width: min(800px, 94vw);
            margin: 40px auto 60px;
        }

        .header {
            padding: clamp(26px, 4vw, 44px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            text-align: center;
        }

        .header-title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(32px, 4.4vw, 52px);
            color: var(--primary);
            margin-bottom: 10px;
            letter-spacing: 0.8px;
        }

        .header-subtitle {
            color: var(--ink-soft);
            font-size: clamp(14px, 1.8vw, 18px);
            line-height: 1.8;
        }

        .music-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 自定义 MetingJS/APlayer 样式 */
        .aplayer {
            border-radius: var(--radius-md) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08) !important;
            border: 1px solid var(--line) !important;
            background: rgba(255, 255, 255, 0.95) !important;
        }

        .aplayer .aplayer-info {
            padding: 14px 15px !important;
        }

        /* 歌词区域始终显示 */
        .aplayer .aplayer-lrc {
            display: block !important;
            padding: 10px 0 !important;
            height: 120px !important;
            margin: 0 !important;
        }

        .aplayer .aplayer-lrc:before,
        .aplayer .aplayer-lrc:after {
            display: none !important;
        }

        .aplayer .aplayer-lrc p {
            font-size: 13px !important;
            color: var(--ink-soft) !important;
            transition: all 0.3s ease !important;
        }

        .aplayer .aplayer-lrc p.aplayer-lrc-current {
            color: var(--primary) !important;
            font-weight: 700 !important;
            font-size: 15px !important;
        }

        .footer {
            width: min(1200px, 94vw);
            margin: 40px auto 34px;
            text-align: center;
            font-size: 13px;
            color: #85909b;
            border-top: 1px solid var(--line);
            padding-top: 30px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .footer-links .link-label {
            color: var(--primary);
            font-weight: 700;
            margin-right: 4px;
        }

        @media (max-width: 680px) {
            .nav-links {
                justify-content: flex-start;
            }

            .container {
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="articles.html">文章</a></li>
                <li><a href="podcast.html">播客</a></li>
                <li><a href="software.html">软件</a></li>
                <li><a href="music.html" class="active">音乐</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1 class="header-title">🎵 原创AI音乐</h1>
            <p class="header-subtitle">Follow Heart，在旋律中寻找自由</p>
        </div>

        <div class="music-card">
            <!-- MetingJS 组件 - lrc-type="1" 使用网易云歌词API -->
            <meting-js server="netease" type="song" id="3353644885" theme="#5D7B93" fixed="false" autoplay="false"
                loop="all" order="list" preload="auto" list-folded="false" list-max-height="340px" lrc-type="1">
            </meting-js>

            <p style="text-align: center; font-size: 13px; color: var(--ink-soft); margin-top: 10px;">
                <i class="fas fa-music"></i> 点击播放即可查看实时滚动歌词
            </p>
        </div>
    </div>

    <div class="footer">
        <div class="footer-links">
            <span class="link-label">友情链接</span>
            <a href="https://muimi.club" target="_blank" rel="noopener" data-umami-event="friend_link_click"
                data-umami-props='{"site":"muimi.club", "from":"footer"}'>
                <i class="fas fa-link"></i>
                <span>Muimi Club</span>
            </a>
        </div>
        <p>© 2026 文鳐夜飞 | Made with ❤️ | 全网同名</p>
    </div>

    <script src="js/umami-config.js"></script>
    <script src="js/analytics.js"></script>
    <script>
        // 等待 MetingJS 初始化 APlayer 后强制展开歌词
        (function () {
            let attempts = 0;
            const maxAttempts = 50;

            function ensureLyricsVisible() {
                const lrcElements = document.querySelectorAll('.aplayer-lrc');
                if (lrcElements.length > 0) {
                    lrcElements.forEach(function (lrc) {
                        lrc.style.display = 'block';
                    });
                    // 同时确保歌词切换按钮处于激活状态
                    const lrcBtns = document.querySelectorAll('.aplayer-icon-lrc');
                    lrcBtns.forEach(function (btn) {
                        // 检查是否歌词已隐藏，如果隐藏则点击展开
                        const lrcContainer = btn.closest('.aplayer').querySelector('.aplayer-lrc');
                        if (lrcContainer && lrcContainer.classList.contains('aplayer-lrc-hide')) {
                            btn.click();
                        }
                    });
                    return;
                }
                attempts++;
                if (attempts < maxAttempts) {
                    setTimeout(ensureLyricsVisible, 200);
                }
            }

            // DOM加载后开始检测
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function () {
                    setTimeout(ensureLyricsVisible, 500);
                });
            } else {
                setTimeout(ensureLyricsVisible, 500);
            }
        })();
    </script>
</body>

</html>
