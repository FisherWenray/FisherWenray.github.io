<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 文鳐夜飞</title>
    <link rel="icon" type="image/jpeg" href="微信图片_2026-01-23_124826_064.jpg">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <style>
        :root {
            --primary: #5D7B93;
            --primary-rgb: 93, 123, 147;
            --deep: #2A3645;
            --gold: #c5b358;
            --ink: #263038;
            --ink-soft: #616c78;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.88);
            --line: rgba(93, 123, 147, 0.2);
            --radius-xl: 22px;
            --radius-lg: 16px;
            --radius-sm: 10px;
            --shadow: 0 20px 46px rgba(28, 39, 50, 0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 140;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .top-nav .nav-links {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 10px;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .top-nav .nav-links a {
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .top-nav .nav-links a:hover,
        .top-nav .nav-links a.active {
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .page {
            width: min(980px, 94vw);
            margin: 28px auto 34px;
        }

        .container {
            border-radius: var(--radius-xl);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: fadeInUp 0.45s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .article-header {
            padding: clamp(28px, 5vw, 52px) clamp(18px, 5vw, 56px) clamp(20px, 4vw, 34px);
            text-align: center;
            border-bottom: 1px solid rgba(var(--primary-rgb), 0.16);
            background: linear-gradient(155deg, rgba(var(--primary-rgb), 0.1), rgba(255, 255, 255, 0.96));
        }

        .article-category-badge {
            display: inline-block;
            background: rgba(var(--primary-rgb), 0.12);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: 0.2px;
        }

        .article-title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(27px, 4vw, 44px);
            line-height: 1.4;
            margin-bottom: 14px;
            color: var(--ink);
            letter-spacing: 0.4px;
        }

        .article-description {
            font-size: clamp(14px, 1.8vw, 18px);
            color: var(--ink-soft);
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .article-meta {
            display: flex;
            justify-content: center;
            gap: 12px 22px;
            flex-wrap: wrap;
            font-size: 13px;
            color: #86929f;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .article-body {
            padding: clamp(20px, 4vw, 44px) clamp(18px, 5vw, 56px) clamp(28px, 5vw, 48px);
        }

        .article-content {
            line-height: 1.95;
            color: var(--ink);
            font-size: 16px;
        }

        .article-content h1,
        .article-content h2,
        .article-content h3 {
            margin: 30px 0 14px;
            color: var(--primary);
            font-family: 'Noto Serif SC', serif;
            line-height: 1.55;
        }

        .article-content h1 {
            font-size: clamp(24px, 3.2vw, 34px);
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(var(--primary-rgb), 0.22);
        }

        .article-content h2 {
            font-size: clamp(22px, 2.8vw, 30px);
        }

        .article-content h3 {
            font-size: clamp(19px, 2.4vw, 24px);
        }

        .article-content p {
            margin-bottom: 18px;
            text-align: justify;
        }

        .article-content strong {
            color: var(--primary);
            font-weight: 700;
        }

        .article-content em {
            color: #6c7783;
        }

        .article-content code {
            background: rgba(var(--primary-rgb), 0.1);
            padding: 2px 7px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            color: #c43b77;
            font-size: 14px;
        }

        .article-content pre {
            background: #1f2530;
            color: #f8f8f2;
            padding: 18px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 18px 0;
            line-height: 1.6;
            border: 1px solid rgba(var(--primary-rgb), 0.25);
        }

        .article-content pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }

        .article-content a {
            color: var(--primary);
            text-decoration: none;
            border-bottom: 1px dashed var(--gold);
            transition: all 0.25s ease;
        }

        .article-content a:hover {
            background: rgba(var(--primary-rgb), 0.08);
        }

        .article-content ul,
        .article-content ol {
            margin: 18px 0 18px 28px;
        }

        .article-content li {
            margin-bottom: 10px;
            color: #4d5863;
        }

        .article-content blockquote {
            border-left: 3px solid var(--gold);
            background: rgba(var(--primary-rgb), 0.08);
            padding: 16px;
            margin: 18px 0;
            border-radius: 8px;
            color: #5a6570;
            font-style: italic;
        }

        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 18px 0;
            border: 1px solid rgba(var(--primary-rgb), 0.22);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
        }

        /* 友情链接样式 */
        .friend-links-card {
            margin-top: 28px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            padding: clamp(16px, 3vw, 24px);
            text-align: center;
        }

        .friend-links-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .friend-links-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .friend-link {
            text-decoration: none;
            color: var(--ink-soft);
            background: rgba(var(--primary-rgb), 0.08);
            border: 1px solid rgba(var(--primary-rgb), 0.22);
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .friend-link:hover {
            color: var(--primary);
            background: rgba(var(--primary-rgb), 0.15);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .article-content hr {
            margin: 28px 0;
            border: none;
            border-top: 1px solid rgba(var(--primary-rgb), 0.18);
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
            padding-top: 24px;
            border-top: 1px solid rgba(var(--primary-rgb), 0.14);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(var(--primary-rgb), 0.11);
            color: var(--primary);
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .tag:hover {
            background: linear-gradient(135deg, var(--primary), var(--deep));
            color: #fff;
        }

        .article-footer {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 1px solid rgba(var(--primary-rgb), 0.14);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .article-footer .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
            text-decoration: none;
            border-radius: 999px;
            transition: all 0.25s ease;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(var(--primary-rgb), 0.26);
        }

        .nav-link:hover {
            background: linear-gradient(135deg, var(--primary), var(--deep));
            color: #fff;
            border-color: transparent;
        }

        .share-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
            text-decoration: none;
            transition: all 0.25s ease;
            border: 1px solid rgba(var(--primary-rgb), 0.26);
        }

        .share-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--deep));
            color: #fff;
            border-color: transparent;
            transform: scale(1.08);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--ink-soft);
        }

        .spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3px solid rgba(var(--primary-rgb), 0.18);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: #c53434;
            text-align: center;
            padding: 24px;
            background: #fdeaea;
            border-radius: 10px;
            border: 1px solid #f0c5c5;
            margin: 20px 0;
        }

        @media (max-width: 760px) {
            .top-nav .nav-links {
                justify-content: flex-start;
            }

            .article-meta {
                justify-content: flex-start;
            }

            .article-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .article-footer .nav-links {
                width: 100%;
            }

            .nav-link {
                justify-content: center;
                flex: 1;
            }
        }

        @media (max-width: 560px) {
            .article-footer .nav-links {
                flex-direction: column;
            }

            .nav-link {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="articles.html" class="active">文章</a></li>
                <li><a href="podcast.html">播客</a></li>
                <li><a href="software.html">软件</a></li>
            </ul>
        </div>
    </nav>

    <main class="page">
        <div class="container">
            <div class="article-header">
                <div id="articleHeaderContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>

            <div class="article-body">
                <div id="articleContent" class="article-content">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/umami-config.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/article-loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>
        async function initPage() {
            const articleId = ArticleLoader.getUrlParam('id');

            if (!articleId) {
                document.getElementById('articleContent').innerHTML =
                    '<div class="error"><i class="fas fa-exclamation-circle"></i> 文章ID无效</div>';
                return;
            }

            const article = await ArticleLoader.load(articleId);

            if (!article) {
                return;
            }

            trackEvent('article_detail_view', {
                article_id: articleId,
                category: article.category
            });

            document.title = `${article.title} - 文鳐夜飞`;

            const headerContent = document.getElementById('articleHeaderContent');
            const date = new Date(article.date).toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            headerContent.innerHTML = `
                <span class="article-category-badge">${article.category}</span>
                <h1 class="article-title">${article.title}</h1>
                <p class="article-description">${article.description}</p>
                <div class="article-meta">
                    <div class="meta-item">
                        <i class="far fa-user"></i>
                        <span>${article.author}</span>
                    </div>
                    <div class="meta-item">
                        <i class="far fa-calendar"></i>
                        <span>${date}</span>
                    </div>
                    <div class="meta-item">
                        <i class="far fa-clock"></i>
                        <span>${article.readTime} 分钟阅读</span>
                    </div>
                </div>
            `;

            const contentDiv = document.getElementById('articleContent');
            contentDiv.innerHTML = article.htmlContent;

            contentDiv.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });

            const tagsHtml = article.tags.map(tag =>
                `<span class="tag"><i class="fas fa-tag"></i> ${tag}</span>`
            ).join('');

            const footerHtml = `
                <div class="article-tags">
                    ${tagsHtml}
                </div>
                <div class="article-footer">
                    <div class="nav-links">
                        <a href="articles.html" class="nav-link">
                            <i class="fas fa-list"></i>
                            <span>返回列表</span>
                        </a>
                        <a href="index.html" class="nav-link">
                            <i class="fas fa-home"></i>
                            <span>返回首页</span>
                        </a>
                    </div>
                    <div class="share-buttons">
                        <a href="#" class="share-btn" title="分享到微信" onclick="shareToWechat(); return false;">
                            <i class="fab fa-weixin"></i>
                        </a>
                        <a href="#" class="share-btn" title="分享到微博" onclick="shareToWeibo(); return false;">
                            <i class="fab fa-weibo"></i>
                        </a>
                        <a href="#" class="share-btn" title="复制链接" onclick="copyLink(); return false;">
                            <i class="fas fa-link"></i>
                        </a>
                    </div>
                </div>
            `;

            contentDiv.innerHTML += footerHtml;

            // 添加友情链接
            const friendLinksHtml = `
                <div class="friend-links-card">
                    <div class="friend-links-title">
                        <i class="fas fa-link"></i>
                        <span>友情链接</span>
                    </div>
                    <div class="friend-links-container">
                        <a href="https://muimi.club" target="_blank" rel="noopener" class="friend-link" title="Muimi Club"
                            data-umami-event="friend_link_click" data-umami-props='{"site":"muimi.club", "from":"article_detail"}'>
                            <i class="fas fa-link"></i>
                            <span>Muimi Club</span>
                        </a>
                    </div>
                </div>
            `;
            contentDiv.innerHTML += friendLinksHtml;

            contentDiv.querySelectorAll('a[target="_blank"]').forEach(link => {
                link.style.marginRight = '4px';
            });
        }

        function shareToWechat() {
            trackEvent('article_share_click', { channel: 'wechat' });
            alert('请扫描二维码后，在微信中分享此链接');
        }

        function shareToWeibo() {
            trackEvent('article_share_click', { channel: 'weibo' });
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(document.title);
            window.open(`https://service.weibo.com/share/share.php?url=${url}&title=${title}`);
        }

        function copyLink() {
            const text = window.location.href;
            navigator.clipboard.writeText(text).then(() => {
                trackEvent('article_copy_link', { status: 'success' });
                alert('链接已复制到剪贴板');
            }).catch(err => {
                trackEvent('article_copy_link', { status: 'failed' });
                console.error('复制失败:', err);
            });
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>

</html>
