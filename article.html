<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 文鳐夜飞</title>
    <link rel="icon" type="image/jpeg" href="微信图片_2026-01-23_124826_064.jpg">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/base16/one-light.min.css">
    <style>
        :root {
            --primary: #5D7B93;
            --primary-rgb: 93, 123, 147;
            --deep: #2A3645;
            --gold: #c5b358;
            --ink: #273039;
            --ink-soft: #5f6a75;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.86);
            --line: rgba(93, 123, 147, 0.22);
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 20px 44px rgba(28, 39, 50, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
            scrollbar-gutter: stable;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 120;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 10px;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 0;
            width: 80px;
            text-align: center;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .page {
            width: min(980px, 94vw);
            margin: 28px auto 34px;
        }

        .container {
            border-radius: var(--radius-xl);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: fadeInUp 0.45s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .article-header {
            padding: clamp(28px, 5vw, 52px) clamp(18px, 5vw, 56px) clamp(20px, 4vw, 34px);
            text-align: center;
            border-bottom: 1px solid rgba(var(--primary-rgb), 0.16);
            background: linear-gradient(155deg, rgba(var(--primary-rgb), 0.1), rgba(255, 255, 255, 0.96));
        }

        .article-category-badge {
            display: inline-block;
            background: rgba(var(--primary-rgb), 0.12);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: 0.2px;
        }

        .article-title {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: clamp(28px, 4.5vw, 42px);
            color: var(--primary);
            font-weight: bold;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 0;
            padding-bottom: 20px;
            letter-spacing: 1.5px;
        }

        .article-description {
            font-size: clamp(14px, 1.8vw, 17px);
            color: var(--ink-soft);
            margin-bottom: 20px;
            line-height: 1.7;
            text-align: center;
        }

        .article-meta {
            display: flex;
            justify-content: center;
            gap: 12px 22px;
            flex-wrap: wrap;
            font-size: 13px;
            color: #86929f;
            margin-bottom: 10px;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .article-body {
            padding: clamp(20px, 4vw, 44px) clamp(18px, 5vw, 56px) clamp(28px, 5vw, 48px);
        }

        /* 文章正文完全对齐 Typora fisher.css 主题 */
        .article-content {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #000000;
            line-height: 1.6;
            font-size: 16px;
        }

        /* 标题基础样式 - 对齐 fisher.css */
        .article-content h1,
        .article-content h2,
        .article-content h3,
        .article-content h4,
        .article-content h5,
        .article-content h6 {
            color: var(--primary);
            font-weight: bold;
            margin-top: 1.5em;
            margin-bottom: 1em;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* 一级标题：隐藏 */
        .article-content h1 {
            display: none;
        }

        /* 二级标题保留线条以区分层级 */
        .article-content h2 {
            border-bottom: 1px solid #eef2f5;
            padding-bottom: 5px;
            font-size: clamp(22px, 2.8vw, 30px);
        }

        .article-content h3 {
            font-size: clamp(19px, 2.4vw, 24px);
        }

        /* 段落样式 */
        .article-content p {
            margin-bottom: 1.2em;
            text-align: justify;
        }

        /* 链接与加粗 */
        .article-content a {
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px dashed var(--gold);
            transition: all 0.25s ease;
        }

        .article-content a:hover {
            color: #b3a24d;
            border-bottom: 1px solid #b3a24d;
        }

        .article-content strong {
            color: #000000;
            padding: 0 2px;
            font-weight: bold;
        }

        /* 引用块 */
        .article-content blockquote {
            border-left: 4px solid var(--primary);
            padding: 10px 20px;
            background-color: #f0f4f7;
            color: #555;
            font-style: italic;
            margin: 20px 0;
            border-radius: 0 4px 4px 0;
        }

        /* 列表符号 */
        .article-content ul,
        .article-content ol {
            margin: 18px 0 18px 28px;
        }

        .article-content li {
            margin-bottom: 10px;
        }

        .article-content li::marker {
            color: var(--gold);
            font-weight: bold;
        }

        /* 行内代码 - 对齐 fisher.css */
        .article-content code {
            background-color: #f1f4f6;
            color: #4a6376;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: "Cascadia Code", "JetBrains Mono", "Consolas", monospace;
            font-size: 0.9em;
            border: 1px solid #e2e8ee;
        }

        /* 代码块 - 对齐 fisher.css .md-fences */
        .article-content pre {
            background-color: #e2e9ef;
            color: #2c3e50;
            border: 1px solid #d4c36d;
            border-radius: 8px;
            padding: 20px;
            margin: 25px 0;
            overflow-x: auto;
            line-height: 1.6;
            box-shadow: 0 4px 12px rgba(93, 123, 147, 0.1);
            position: relative;
        }

        .article-content pre::before {
            content: "CODE";
            display: block;
            font-size: 10px;
            color: var(--primary);
            margin-bottom: 12px;
            opacity: 0.5;
            letter-spacing: 2px;
            font-weight: bold;
            font-family: 'JetBrains Mono', monospace;
        }

        .article-content pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
            border-radius: 0;
            border: none;
            font-size: 14px;
            font-family: "JetBrains Mono", "Cascadia Code", "Consolas", monospace;
        }

        /* 表格样式 */
        .article-content table {
            width: 100%;
            margin-bottom: 20px;
            border-collapse: collapse;
        }

        .article-content thead th {
            background-color: var(--primary);
            color: white;
            padding: 10px;
            text-align: left;
        }

        .article-content td,
        .article-content th {
            border: 1px solid #dfe2e5;
            padding: 8px 12px;
        }

        .article-content tr:nth-child(2n) {
            background-color: #f6f8fa;
        }

        /* 分割线 */
        .article-content hr {
            height: 2px;
            padding: 0;
            margin: 24px 0;
            background-color: #e1e4e8;
            border: 0;
        }

        /* 图片样式 */
        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
            display: block;
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
            padding-top: 24px;
            border-top: 1px solid rgba(var(--primary-rgb), 0.14);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(var(--primary-rgb), 0.11);
            color: var(--primary);
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .tag:hover {
            background: linear-gradient(135deg, var(--primary), var(--deep));
            color: #fff;
        }

        .article-footer {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 1px solid rgba(var(--primary-rgb), 0.14);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .article-footer .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
            text-decoration: none;
            border-radius: 999px;
            transition: all 0.25s ease;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(var(--primary-rgb), 0.26);
        }

        .nav-link:hover {
            background: linear-gradient(135deg, var(--primary), var(--deep));
            color: #fff;
            border-color: transparent;
        }

        .share-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
            text-decoration: none;
            transition: all 0.25s ease;
            border: 1px solid rgba(var(--primary-rgb), 0.26);
        }

        .share-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--deep));
            color: #fff;
            border-color: transparent;
            transform: scale(1.08);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--ink-soft);
        }

        .spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3px solid rgba(var(--primary-rgb), 0.18);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: #c53434;
            text-align: center;
            padding: 24px;
            background: #fdeaea;
            border-radius: 10px;
            border: 1px solid #f0c5c5;
            margin: 20px 0;
        }

        @media (max-width: 760px) {
            .top-nav .nav-links {
                justify-content: flex-start;
            }

            .article-meta {
                justify-content: flex-start;
            }

            .article-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .article-footer .nav-links {
                width: 100%;
            }

            .nav-link {
                justify-content: center;
                flex: 1;
            }
        }

        /* 页脚和友情链接样式 */
        .footer {
            width: min(1200px, 94vw);
            margin: 40px auto 34px;
            text-align: center;
            color: #8b97a2;
            font-size: 13px;
            border-top: 1px solid rgba(var(--primary-rgb), 0.14);
            padding-top: 30px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .footer-links .link-label {
            color: var(--primary);
            font-weight: 700;
            margin-right: 4px;
        }

        @media (max-width: 560px) {
            .article-footer .nav-links {
                flex-direction: column;
            }

            .nav-link {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="articles.html">Blog</a></li>
                <li><a href="podcast.html">播客</a></li>
                <li><a href="software.html">产品</a></li>
                <li><a href="music.html">音乐</a></li>
            </ul>
        </div>
    </nav>

    <main class="page">
        <div class="container">
            <div class="article-header">
                <div id="articleHeaderContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>

            <div class="article-body">
                <div id="articleContent" class="article-content">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="footer">
        <div class="footer-links">
            <span class="link-label">友情链接</span>
            <a href="https://muimi.club" target="_blank" rel="noopener" data-umami-event="friend_link_click"
                data-umami-props='{"site":"muimi.club", "from":"footer"}'>
                <i class="fas fa-link"></i>
                <span>Muimi Club</span>
            </a>
        </div>
        <p>© 2026 文鳐夜飞 | 追求自由之路</p>
    </div>

    <script src="js/umami-config.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/article-loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>
        async function initPage() {
            const articleId = ArticleLoader.getUrlParam('id');

            if (!articleId) {
                document.getElementById('articleContent').innerHTML =
                    '<div class="error"><i class="fas fa-exclamation-circle"></i> 文章ID无效</div>';
                return;
            }

            const article = await ArticleLoader.load(articleId);

            if (!article) {
                return;
            }

            trackEvent('article_detail_view', {
                article_id: articleId,
                category: article.category
            });

            document.title = `${article.title} - 文鳐夜飞`;

            const headerContent = document.getElementById('articleHeaderContent');
            const date = new Date(article.date).toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            headerContent.innerHTML = `
                <h1 class="article-title">${article.title}</h1>
                <p class="article-description">${article.description}</p>
                <div class="article-meta">
                    <div class="meta-item">
                        <i class="far fa-user"></i>
                        <span>${article.author}</span>
                    </div>
                    <div class="meta-item">
                        <i class="far fa-calendar"></i>
                        <span>${date}</span>
                    </div>
                    <div class="meta-item">
                        <i class="far fa-clock"></i>
                        <span>${article.readTime} 分钟阅读</span>
                    </div>
                </div>
            `;

            const contentDiv = document.getElementById('articleContent');
            contentDiv.innerHTML = article.htmlContent;

            contentDiv.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });

            contentDiv.querySelectorAll('a[target="_blank"]').forEach(link => {
                link.style.marginRight = '4px';
            });
        }

        function shareToWechat() {
            trackEvent('article_share_click', { channel: 'wechat' });
            alert('请扫描二维码后，在微信中分享此链接');
        }

        function shareToWeibo() {
            trackEvent('article_share_click', { channel: 'weibo' });
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(document.title);
            window.open(`https://service.weibo.com/share/share.php?url=${url}&title=${title}`);
        }

        function copyLink() {
            const text = window.location.href;
            navigator.clipboard.writeText(text).then(() => {
                trackEvent('article_copy_link', { status: 'success' });
                alert('链接已复制到剪贴板');
            }).catch(err => {
                trackEvent('article_copy_link', { status: 'failed' });
                console.error('复制失败:', err);
            });
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>

</html>
