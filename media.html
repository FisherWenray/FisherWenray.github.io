    <script>
        function toggleMobileMenu(){const n=document.getElementById('navLinks');if(n)n.classList.toggle('active')}
        function escapeMediaText(value){const d=document.createElement('div');d.textContent=value==null?'':String(value);return d.innerHTML}
        function formatDuration(seconds){if(!seconds)return '';const h=Math.floor(seconds/3600);const m=Math.floor((seconds%3600)/60);const s=seconds%60;return h>0?h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'):m+':'+String(s).padStart(2,'0')}
        function renderMediaCards(gridId, items, options){const grid=document.getElementById(gridId);const data=(Array.isArray(items)?items:[]).slice(0,3);if(!data.length){grid.innerHTML='<div class="empty-media">'+escapeMediaText(options.emptyText||'暂时没有可展示的内容。')+'</div>';return}grid.innerHTML=data.map(item=>{const cover=item.cover||item.coverUrl||item.pic||'';const icon=item.icon||options.icon||'fas fa-play';const href=item.href||item.watchUrl||item.externalUrl||options.fallbackHref||'#';const meta=[item.date||item.publishedAt,item.duration].filter(Boolean).join(' · ')||options.meta||'';const summary=item.summary||item.description||'';return '<a class="media-card" href="'+escapeMediaText(href)+'" '+(href==='#'?'':'target="_blank" rel="noopener"')+'><div class="media-cover '+(cover?'':'no-image')+'">'+(cover?'<img src="'+escapeMediaText(cover)+'" alt="" loading="lazy">':'<i class="'+escapeMediaText(icon)+'"></i>')+'<span class="media-play"><i class="'+escapeMediaText(icon)+'"></i></span></div><div class="media-body"><span class="media-meta">'+escapeMediaText(meta)+'</span><h3>'+escapeMediaText(item.title||'未命名')+'</h3>'+(summary?'<p class="media-summary">'+escapeMediaText(summary)+'</p>':'')+'<span class="media-card-action">'+escapeMediaText(options.actionText||'打开观看')+' <i class="fas fa-arrow-up-right-from-square"></i></span></div></a>'}).join('')}
        function formatDate(dateText){if(!dateText)return '';const date=new Date(dateText);if(Number.isNaN(date.getTime()))return dateText;return date.getFullYear()+'年'+String(date.getMonth()+1).padStart(2,'0')+'月'+String(date.getDate()).padStart(2,'0')+'日'}
        function renderPodcastEpisodes(items){
            const grid=document.getElementById('mediaPodcastGrid'); const data=(Array.isArray(items)?items:[]).slice(0,3);
            if(!data.length){grid.innerHTML='<div class="empty-media">暂时没有可展示的播客节目。</div>';return}
            grid.innerHTML=data.map((ep,index)=>'<article class="episode-item" id="mediaEpisode-'+index+'" data-podcast-index="'+index+'"><div class="episode-mini" role="button" tabindex="0" aria-label="播放 '+escapeMediaText(ep.title||'播客节目')+'"><img src="'+escapeMediaText(ep.coverUrl||'images/article-placeholder.svg')+'" class="episode-cover" alt="封面" loading="lazy" decoding="async" onerror="this.src=\'images/article-placeholder.svg\'"><div class="episode-info"><div class="episode-title">'+escapeMediaText(ep.title||'未知标题')+'</div><div class="episode-meta"><span>'+escapeMediaText(formatDate(ep.date))+'</span><span>•</span><span>'+escapeMediaText(ep.duration||'')+'</span></div></div><div class="play-btn-icon" aria-hidden="true"><i class="fas fa-play"></i></div></div><div class="episode-inline-player" id="mediaInlinePlayer-'+index+'"><div class="inline-progress"><div class="inline-progress-bar" id="mediaProgressBar-'+index+'" role="slider" aria-label="播放进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div class="inline-progress-fill" id="mediaProgressFill-'+index+'" style="width:0%"></div></div><button class="speed-btn" type="button" data-podcast-speed="'+index+'">1x</button><span class="inline-time" id="mediaTimeDisplay-'+index+'">0:00 / 0:00</span></div></div></article>').join('');
            setupMediaPodcastPlayer(grid,data);
        }
        function setupMediaPodcastPlayer(grid,episodes){
            let audio=null; let activeIndex=-1; let speed=1; const speedOptions=[1,1.25,1.5,1.75,2];
            const formatTime=seconds=>{const safe=Number.isFinite(seconds)?seconds:0;return Math.floor(safe/60)+':'+String(Math.floor(safe%60)).padStart(2,'0')};
            const get=id=>document.getElementById(id);
            function updateProgress(){if(!audio||activeIndex<0)return; const duration=audio.duration; const percent=Number.isFinite(duration)&&duration>0?audio.currentTime/duration*100:0; const fill=get('mediaProgressFill-'+activeIndex); const time=get('mediaTimeDisplay-'+activeIndex); const bar=get('mediaProgressBar-'+activeIndex); if(fill)fill.style.width=percent+'%'; if(time)time.textContent=formatTime(audio.currentTime)+' / '+formatTime(duration); if(bar)bar.setAttribute('aria-valuenow',String(Math.round(percent)))}
            function setEpisodeState(index,playing){const item=get('mediaEpisode-'+index); const inline=get('mediaInlinePlayer-'+index); if(item)item.classList.toggle('playing',playing); if(inline)inline.classList.toggle('active',playing); const icon=item&&item.querySelector('.play-btn-icon i'); if(icon)icon.className=playing?'fas fa-pause':'fas fa-play'}
            function stopCurrent(){if(!audio||activeIndex<0)return; audio.pause(); setEpisodeState(activeIndex,false); audio=null; activeIndex=-1}
            function toggleSpeed(index){if(index!==activeIndex||!audio)return; speed=speedOptions[(speedOptions.indexOf(speed)+1)%speedOptions.length]; audio.playbackRate=speed; const button=grid.querySelector('[data-podcast-speed="'+index+'"]'); if(button)button.textContent=speed===1?'1x':speed+'x'}
            async function playEpisode(index){const episode=episodes[index]; if(!episode||!episode.audioUrl)return; if(index===activeIndex&&audio){if(audio.paused){try{await audio.play();setEpisodeState(index,true)}catch(error){}}else{audio.pause();setEpisodeState(index,false)}return} stopCurrent(); audio=new Audio(episode.audioUrl); activeIndex=index; audio.playbackRate=speed; setEpisodeState(index,true); const speedButton=grid.querySelector('[data-podcast-speed="'+index+'"]'); if(speedButton)speedButton.textContent=speed===1?'1x':speed+'x'; audio.addEventListener('loadedmetadata',updateProgress); audio.addEventListener('timeupdate',updateProgress); audio.addEventListener('ended',()=>{updateProgress();setEpisodeState(index,false)}); try{await audio.play()}catch(error){}}
            grid.onclick=event=>{const speedButton=event.target.closest('[data-podcast-speed]'); const card=event.target.closest('[data-podcast-index]'); if(!card)return; const index=Number(card.dataset.podcastIndex); if(speedButton){event.stopPropagation();toggleSpeed(index);return} const progress=event.target.closest('.inline-progress-bar'); if(progress){event.stopPropagation();if(audio&&index===activeIndex&&Number.isFinite(audio.duration)){const rect=progress.getBoundingClientRect();audio.currentTime=Math.max(0,Math.min(audio.duration,(event.clientX-rect.left)/rect.width*audio.duration));updateProgress()}return} playEpisode(index)};
            grid.onkeydown=event=>{if((event.key==='Enter'||event.key===' ')&&event.target.closest('[data-podcast-index]')){event.preventDefault();playEpisode(Number(event.target.closest('[data-podcast-index]').dataset.podcastIndex))}};
        }
        function renderMediaVideos(items){const videos=(Array.isArray(items)?items:[]).slice().sort((a,b)=>String(b.publishedAt||'').localeCompare(String(a.publishedAt||'')));renderMediaCards('mediaVideoGrid',videos,{icon:'fas fa-play',actionText:'打开视频',emptyText:'暂时没有可展示的视频。'})}
        function initMediaMusicPlayer(){
            const audio=document.getElementById('mediaMusicAudio'); const player=document.getElementById('mediaMiniPlayer'); const button=document.getElementById('mediaMusicPlayBtn'); const icon=document.getElementById('mediaMusicPlayIcon'); const hint=document.getElementById('mediaMusicHint'); const expanded=document.getElementById('mediaExpandedPlayer');
            if(!audio||!player||!button||!icon||!hint||!expanded)return;
            const playIcon='<path d="M8 5v14l11-7z"></path>'; const pauseIcon='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>'; let isExpanded=false; let lyrics=[];
            const formatTime=seconds=>{const safe=Number.isFinite(seconds)?seconds:0; return Math.floor(safe/60)+':'+String(Math.floor(safe%60)).padStart(2,'0')};
            const parseLrc=text=>(text.match(/^\[\d{2}:\d{2}\.\d{2,3}\].*$/gm)||[]).map(line=>{const match=line.match(/^\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)$/); return match?{time:Number(match[1])*60+Number(match[2])+Number(match[3].padEnd(3,'0'))/1000,text:match[4].trim()}:null}).filter(item=>item&&item.text);
            function setPlaying(playing){icon.innerHTML=playing?pauseIcon:playIcon; button.setAttribute('aria-label',playing?'暂停海阔余响':'播放海阔余响'); button.setAttribute('aria-pressed',playing?'true':'false'); hint.innerHTML=playing?'<i class="fas fa-volume-high"></i> 正在播放《海阔余响》':'<i class="fas fa-music"></i> 点击播放按钮展开播放器'}
            function renderExpanded(){expanded.innerHTML='<div class="player-progress"><div class="progress-bar-wrapper" id="mediaProgressBar" role="slider" aria-label="播放进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div class="progress-fill" id="mediaProgressFill" style="width:0%"><div class="progress-thumb"></div></div></div><div class="progress-time"><span id="mediaCurrentTime">0:00</span><span id="mediaTotalTime">'+formatTime(audio.duration)+'</span></div></div><div class="player-lyrics"><div class="lyrics-container" id="mediaLyricsContainer">'+(lyrics.length?lyrics.map((line,index)=>'<div class="lyrics-line" data-index="'+index+'">'+escapeMediaText(line.text)+'</div>').join(''):'<div class="lyrics-empty">正在加载歌词...</div>')+'</div></div>'; const progress=document.getElementById('mediaProgressBar'); progress.addEventListener('click',event=>{if(!Number.isFinite(audio.duration))return; const rect=progress.getBoundingClientRect(); audio.currentTime=Math.max(0,Math.min(audio.duration,(event.clientX-rect.left)/rect.width*audio.duration)); updateProgress()}); updateProgress()}
            function updateLyrics(currentTime){if(!isExpanded||!lyrics.length)return; let active=0; for(let i=0;i<lyrics.length;i+=1){if(currentTime>=lyrics[i].time)active=i;else break} const container=document.getElementById('mediaLyricsContainer'); if(!container)return; const lines=container.querySelectorAll('.lyrics-line'); lines.forEach((line,index)=>line.classList.toggle('active',index===active)); const activeLine=lines[active]; if(activeLine){const viewport=container.parentElement; container.style.transform='translateY('+(viewport.clientHeight/2-activeLine.offsetTop-activeLine.clientHeight/2)+'px)'}}
            function updateProgress(){if(!isExpanded)return; const duration=audio.duration; const current=audio.currentTime||0; const percent=Number.isFinite(duration)&&duration>0?current/duration*100:0; const fill=document.getElementById('mediaProgressFill'); const currentTime=document.getElementById('mediaCurrentTime'); const totalTime=document.getElementById('mediaTotalTime'); const progress=document.getElementById('mediaProgressBar'); if(fill)fill.style.width=percent+'%'; if(currentTime)currentTime.textContent=formatTime(current); if(totalTime)totalTime.textContent=formatTime(duration); if(progress)progress.setAttribute('aria-valuenow',String(Math.round(percent))); updateLyrics(current)}
            function expandPlayer(){if(isExpanded)return; isExpanded=true; expanded.classList.add('expanded'); renderExpanded()}
            function collapsePlayer(){if(!isExpanded)return; isExpanded=false; expanded.classList.remove('expanded')}
            async function togglePlay(){if(audio.paused){hint.innerHTML='<i class="fas fa-spinner fa-spin"></i> 正在加载音乐...'; try{await audio.play()}catch(error){setPlaying(false); hint.innerHTML='<i class="fas fa-exclamation-circle"></i> 音频暂时不可用，可点击“查看完整版”'}}else audio.pause()}
            async function loadLyrics(){try{const response=await fetch('https://api.i-meto.com/meting/api?server=netease&type=song&id=3353644885'); if(!response.ok)throw new Error('song metadata unavailable'); const songs=await response.json(); const lrcUrl=songs&&songs[0]&&songs[0].lrc; if(!lrcUrl)throw new Error('lyrics unavailable'); const lyricResponse=await fetch(lrcUrl); if(!lyricResponse.ok)throw new Error('lyrics unavailable'); lyrics=parseLrc(await lyricResponse.text()); if(!lyrics.length)throw new Error('lyrics unavailable')}catch(error){lyrics=[]}finally{if(isExpanded)renderExpanded()}}
            button.addEventListener('click',event=>{event.preventDefault(); event.stopPropagation(); expandPlayer(); togglePlay()}); player.addEventListener('click',event=>{if(event.target.closest('button'))return; if(isExpanded)collapsePlayer();else expandPlayer()}); audio.addEventListener('loadedmetadata',updateProgress); audio.addEventListener('timeupdate',updateProgress); audio.addEventListener('play',()=>setPlaying(true)); audio.addEventListener('pause',()=>setPlaying(false)); audio.addEventListener('ended',()=>{audio.currentTime=0; setPlaying(false); updateProgress()}); audio.addEventListener('error',()=>{setPlaying(false); hint.innerHTML='<i class="fas fa-exclamation-circle"></i> 音频暂时不可用，可点击“查看完整版”'}); loadLyrics();
        }
        function loadApplePodcastEpisodes(){const podcastId='1825759955';return new Promise(resolve=>{const callbackName='mediaPodcastCallback_'+Date.now();let done=false;function finish(items){if(done)return;done=true;delete window[callbackName];if(script.parentNode)script.parentNode.removeChild(script);resolve(items||[])}window[callbackName]=function(data){const results=data.results||[];const collection=results[0]||{};const collectionCover=collection.artworkUrl100||'';const episodes=results.slice(1).map((ep,index)=>({title:ep.trackName||'未知标题',description:ep.description||'',date:ep.releaseDate?new Date(ep.releaseDate).toISOString().split('T')[0]:'',duration:formatDuration(Math.round((ep.trackTimeMillis||0)/1000)),audioUrl:ep.episodeUrl||ep.previewUrl||'',coverUrl:(ep.artworkUrl100||collectionCover||'').replace(/100x100/,'600x600'),externalUrl:ep.trackViewUrl||('https://podcasts.apple.com/cn/podcast/id'+podcastId),icon:'fas fa-headphones'}));finish(episodes.sort((a,b)=>String(b.date).localeCompare(String(a.date))))};const script=document.createElement('script');script.src='https://itunes.apple.com/lookup?id='+podcastId+'&country=CN&media=podcast&entity=podcastEpisode&limit=20&callback='+callbackName;script.onerror=function(){finish([])};document.body.appendChild(script);setTimeout(()=>finish([]),10000)})}
        window.addEventListener('DOMContentLoaded',initMediaMusicPlayer);
        fetch('bilibili-videos.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('load failed');return r.json()}).then(data=>renderMediaVideos(Array.isArray(data)?data:(data.videos||[]))).catch(()=>renderMediaVideos((window.BILIBILI_VIDEOS_DATA&&window.BILIBILI_VIDEOS_DATA.videos)||[]));
        loadApplePodcastEpisodes().then(renderPodcastEpisodes);
    </script>
