        .media-page { display: grid; gap: 24px; }

        .media-section-kicker { display: block; margin-bottom: 8px; color: var(--gold); font: 600 11px/1 var(--font-mono); letter-spacing: .14em; }
        .media-section h2 { margin: 0; color: var(--ink); font: 700 clamp(28px, 3.8vw, 42px)/1.16 var(--font-serif); }
        .media-section-desc { max-width: 520px; margin: 0; color: var(--ink-soft); font-size: 14px; line-height: 1.75; text-align: right; }
        .media-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
        .media-card { overflow: hidden; display: flex; flex-direction: column; min-height: 100%; color: inherit; text-decoration: none; border: 1px solid rgba(var(--primary-rgb), .18); border-radius: var(--radius-md); background: rgba(var(--primary-rgb), .045); transition: transform .28s ease, border-color .28s ease, box-shadow .28s ease; }
        .media-card:hover { transform: translateY(-5px); border-color: rgba(var(--primary-rgb), .36); box-shadow: 0 18px 34px rgba(var(--primary-rgb), .13); }
        .media-cover { position: relative; aspect-ratio: 16/9; overflow: hidden; background: linear-gradient(135deg, rgba(var(--primary-rgb), .22), rgba(var(--primary-rgb), .06)); }
        .media-cover img { width: 100%; height: 100%; display: block; object-fit: cover; transition: transform .45s ease; }

        .media-cover.no-image { display: grid; place-items: center; color: var(--gold); font-size: 34px; }
        .media-play { position: absolute; left: 14px; bottom: 12px; display: grid; place-items: center; width: 38px; height: 38px; border-radius: 999px; color: #fff; background: rgba(0, 78, 140, .9); box-shadow: 0 8px 18px rgba(0,0,0,.26); }

        .mini-cover { width: 72px; height: 72px; border-radius: 10px; object-fit: cover; box-shadow: 0 4px 12px rgba(42,54,69,.12); flex-shrink: 0; }
        .mini-info { flex: 1; min-width: 0; }
        .mini-title { font-size: 17px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .mini-artist { font-size: 14px; color: var(--ink-soft); }
        .mini-play-btn { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--deep)); display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 4px 12px rgba(0,78,140,.3); transition: all .25s ease; flex-shrink: 0; }
        .mini-player:hover .mini-play-btn { transform: scale(1.08); }
        .mini-play-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .music-hint { margin: 0; color: var(--ink-soft); font-size: 14px; text-align: center; }
        .archive-link { flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-height: 38px; padding: 0 16px; border: 1px solid rgba(var(--primary-rgb), .16); border-radius: 999px; color: var(--primary); background: rgba(var(--primary-rgb), .06); text-decoration: none; font-size: 14px; font-weight: 700; transition: .25s ease; }
        .archive-link:hover { color: #fff; background: var(--primary); border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 12px 24px rgba(var(--primary-rgb), .16); }
        .empty-media { grid-column: 1/-1; padding: 28px; color: var(--ink-soft); text-align: center; border: 1px dashed rgba(var(--primary-rgb), .18); border-radius: var(--radius-md); background: rgba(var(--primary-rgb), .035); }
        [data-theme='dark'] .media-section h2 { color: #fff; text-shadow: 0 0 12px rgba(var(--primary-rgb), .28); }
        [data-theme='dark'] .archive-link { color: var(--gold); }

        [data-theme='dark'] .episode-title, [data-theme='dark'] .mini-title { color: #fff; }
        @media (max-width: 980px) { .media-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 680px) { .media-section-head { align-items: flex-start; flex-direction: column; } .media-section-desc { text-align: left; } .archive-link { width: 100%; } .media-grid { grid-template-columns: 1fr; } .episode-mini, .mini-player { gap: 14px; padding: 14px; } .episode-cover, .mini-cover { width: 62px; height: 62px; } .play-btn-icon, .mini-play-btn { width: 42px; height: 42px; } }

    <script>
        function toggleMobileMenu(){const n=document.getElementById('navLinks');if(n)n.classList.toggle('active')}
        function escapeMediaText(value){const d=document.createElement('div');d.textContent=value==null?'':String(value);return d.innerHTML}
        function formatDuration(seconds){if(!seconds)return '';const h=Math.floor(seconds/3600);const m=Math.floor((seconds%3600)/60);const s=seconds%60;return h>0?h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'):m+':'+String(s).padStart(2,'0')}
        function renderMediaCards(gridId, items, options){const grid=document.getElementById(gridId);const data=(Array.isArray(items)?items:[]).slice(0,3);if(!data.length){grid.innerHTML='<div class="empty-media">'+escapeMediaText(options.emptyText||'暂时没有可展示的内容。')+'</div>';return}grid.innerHTML=data.map(item=>{const cover=item.cover||item.coverUrl||item.pic||'';const icon=item.icon||options.icon||'fas fa-play';const href=item.href||item.watchUrl||item.externalUrl||options.fallbackHref||'#';const meta=[item.date||item.publishedAt,item.duration].filter(Boolean).join(' · ')||options.meta||'';const summary=item.summary||item.description||'';return '<a class="media-card" href="'+escapeMediaText(href)+'" '+(href==='#'?'':'target="_blank" rel="noopener"')+'><div class="media-cover '+(cover?'':'no-image')+'">'+(cover?'<img src="'+escapeMediaText(cover)+'" alt="" loading="lazy">':'<i class="'+escapeMediaText(icon)+'"></i>')+'<span class="media-play"><i class="'+escapeMediaText(icon)+'"></i></span></div><div class="media-body"><span class="media-meta">'+escapeMediaText(meta)+'</span><h3>'+escapeMediaText(item.title||'未命名')+'</h3>'+(summary?'<p class="media-summary">'+escapeMediaText(summary)+'</p>':'')+'<span class="media-card-action">'+escapeMediaText(options.actionText||'打开观看')+' <i class="fas fa-arrow-up-right-from-square"></i></span></div></a>'}).join('')}
        function formatDate(dateText){if(!dateText)return '';const date=new Date(dateText);if(Number.isNaN(date.getTime()))return dateText;return date.getFullYear()+'年'+String(date.getMonth()+1).padStart(2,'0')+'月'+String(date.getDate()).padStart(2,'0')+'日'}
        function renderPodcastEpisodes(items){const grid=document.getElementById('mediaPodcastGrid');const data=(Array.isArray(items)?items:[]).slice(0,3);if(!data.length){grid.innerHTML='<div class="empty-media">暂时没有可展示的播客节目。</div>';return}grid.innerHTML=data.map((ep,index)=>{const href=ep.externalUrl||'podcast.html';return '<a class="episode-item" id="episode-'+index+'" href="'+escapeMediaText(href)+'" target="_blank" rel="noopener"><div class="episode-mini"><img src="'+escapeMediaText(ep.coverUrl||'images/article-placeholder.svg')+'" class="episode-cover" alt="封面" loading="lazy" decoding="async"><div class="episode-info"><div class="episode-title">'+escapeMediaText(ep.title||'未知标题')+'</div><div class="episode-meta"><span>'+escapeMediaText(formatDate(ep.date))+'</span><span>•</span><span>'+escapeMediaText(ep.duration||'')+'</span></div></div><div class="play-btn-icon"><i class="fas fa-play"></i></div></div></a>'}).join('')}
        function renderMediaVideos(items){const videos=(Array.isArray(items)?items:[]).slice().sort((a,b)=>String(b.publishedAt||'').localeCompare(String(a.publishedAt||'')));renderMediaCards('mediaVideoGrid',videos,{icon:'fas fa-play',actionText:'打开视频',emptyText:'暂时没有可展示的视频。'})}
        function loadApplePodcastEpisodes(){const podcastId='1825759955';return new Promise(resolve=>{const callbackName='mediaPodcastCallback_'+Date.now();let done=false;function finish(items){if(done)return;done=true;delete window[callbackName];if(script.parentNode)script.parentNode.removeChild(script);resolve(items||[])}window[callbackName]=function(data){const results=data.results||[];const collection=results[0]||{};const collectionCover=collection.artworkUrl100||'';const episodes=results.slice(1).map((ep,index)=>({title:ep.trackName||'未知标题',description:ep.description||'',date:ep.releaseDate?new Date(ep.releaseDate).toISOString().split('T')[0]:'',duration:formatDuration(Math.round((ep.trackTimeMillis||0)/1000)),coverUrl:(ep.artworkUrl100||collectionCover||'').replace(/100x100/,'600x600'),externalUrl:ep.trackViewUrl||('https://podcasts.apple.com/cn/podcast/id'+podcastId),icon:'fas fa-headphones'}));finish(episodes.sort((a,b)=>String(b.date).localeCompare(String(a.date))))};const script=document.createElement('script');script.src='https://itunes.apple.com/lookup?id='+podcastId+'&country=CN&media=podcast&entity=podcastEpisode&limit=20&callback='+callbackName;script.onerror=function(){finish([])};document.body.appendChild(script);setTimeout(()=>finish([]),10000)})}
        fetch('bilibili-videos.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('load failed');return r.json()}).then(data=>renderMediaVideos(Array.isArray(data)?data:(data.videos||[]))).catch(()=>renderMediaVideos((window.BILIBILI_VIDEOS_DATA&&window.BILIBILI_VIDEOS_DATA.videos)||[]));
        loadApplePodcastEpisodes().then(renderPodcastEpisodes);
    </script>
