<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我开发的产品 - 文鳐夜飞</title>
    <script src="js/theme.js"></script>
    <meta name="description" content="文鳐夜飞的产品集，收录个人开发的工具和应用">
    <link rel="icon" type="image/jpeg" href="微信图片_2026-01-23_124826_064.jpg">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #2A3645;
            --ink: #253038;
            --ink-soft: #606b76;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.87);
            --line: rgba(0, 78, 140, 0.22);
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 20px 44px rgba(28, 39, 50, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
            scrollbar-gutter: stable;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 120;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .theme-toggle {
            background: rgba(var(--primary-rgb), 0.08);
            border: 1px solid var(--line);
            color: var(--primary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: #fff;
            transform: rotate(30deg);
        }

        [data-theme='dark'] .theme-toggle {
            color: var(--gold);
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-links {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 10px;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 0;
            width: 80px;
            text-align: center;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .container {
            width: min(1200px, 94vw);
            margin: 28px auto 34px;
        }

        .header {
            padding: clamp(26px, 4vw, 44px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            text-align: center;
        }

        .header-title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(32px, 4.4vw, 52px);
            color: var(--primary);
            margin-bottom: 10px;
            letter-spacing: 0.8px;
        }

        .header-subtitle {
            color: var(--ink-soft);
            font-size: clamp(14px, 1.8vw, 18px);
            line-height: 1.8;
        }

        .software-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .software-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid rgba(var(--primary-rgb), 0.22);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.5s ease forwards;
            animation-delay: calc(var(--card-index, 0) * 0.08s);
            opacity: 0;
        }

        .software-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 28px rgba(var(--primary-rgb), 0.22);
            border-color: rgba(var(--primary-rgb), 0.45);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-cover {
            position: relative;
            height: 180px;
            background: linear-gradient(145deg, rgba(var(--primary-rgb), 0.08), rgba(var(--primary-rgb), 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-cover::after {
            content: '';
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            right: -120px;
            top: -120px;
            background: radial-gradient(circle, rgba(var(--primary-rgb), 0.35), transparent 70%);
        }

        .card-cover img {
            max-width: 68%;
            max-height: 68%;
            object-fit: contain;
            transition: transform 0.35s ease;
            position: relative;
            z-index: 1;
        }

        .software-card:hover .card-cover img {
            transform: scale(1.06);
        }

        .card-body {
            padding: 18px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(var(--primary-rgb), 0.12);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 10px;
            width: fit-content;
        }

        .card-title {
            font-size: 21px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 10px;
            line-height: 1.45;
        }

        .card-description {
            font-size: 14px;
            color: var(--ink-soft);
            line-height: 1.8;
            margin-bottom: 16px;
            flex: 1;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            padding-top: 14px;
            border-top: 1px solid rgba(var(--primary-rgb), 0.14);
            flex-wrap: wrap;
        }

        .card-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 9px 16px;
            border-radius: 999px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .card-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--deep));
            color: #fff;
            box-shadow: 0 8px 16px rgba(var(--primary-rgb), 0.28);
        }

        .card-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(var(--primary-rgb), 0.34);
        }

        .card-btn-secondary {
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.3);
        }

        .card-btn-secondary:hover {
            background: rgba(var(--primary-rgb), 0.16);
            transform: translateY(-2px);
        }

        .footer {
            width: min(1200px, 94vw);
            margin: 40px auto 34px;
            text-align: center;
            color: #8b97a2;
            font-size: 13px;
            border-top: 1px solid var(--line);
            padding-top: 30px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .footer-links .link-label {
            color: var(--primary);
            font-weight: 700;
            margin-right: 4px;
        }

        @media (max-width: 760px) {
            .nav-links {
                justify-content: flex-start;
            }

            .software-grid {
                grid-template-columns: 1fr;
            }

            .card-cover {
                height: 160px;
            }
        }

        /* --- Deep Sea Glass Dark Theme --- */
        [data-theme='dark'] {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #000814;
            --gold: #c5b358;
            --ink: #FFFFFF;
            --ink-soft: #A0B3C6;
            --paper: #000814;
            --surface: rgba(0, 78, 140, 0.08);
            --line: rgba(0, 78, 140, 0.4);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        [data-theme='dark'] body {
            background: 
                radial-gradient(circle at 50% -20%, rgba(0, 78, 140, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 78, 140, 0.1) 0%, transparent 50%),
                var(--paper) !important;
            color: var(--ink) !important;
            position: relative;
        }

        [data-theme='dark'] body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 1000;
        }

        [data-theme='dark'] .top-nav {
            background: rgba(0, 8, 20, 0.8) !important;
            backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid var(--line);
        }

        [data-theme='dark'] .panel,
        [data-theme='dark'] .section,
        [data-theme='dark'] .article-card,
        [data-theme='dark'] .tool-card,
        [data-theme='dark'] .episode-card,
        [data-theme='dark'] .music-card,
        [data-theme='dark'] .music-player,
        [data-theme='dark'] .modal-content,
        [data-theme='dark'] .description,
        [data-theme='dark'] .episode-item,
        [data-theme='dark'] .software-card,
        [data-theme='dark'] .header {
            background: var(--surface) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid var(--line) !important;
            box-shadow: var(--shadow) !important;
        }

        [data-theme='dark'] .card-cover {
            background: linear-gradient(145deg, rgba(0, 78, 140, 0.2), rgba(0, 78, 140, 0.1)) !important;
        }

        [data-theme='dark'] .nav-links a {
            color: var(--ink-soft);
        }

        [data-theme='dark'] .nav-links a:hover,
        [data-theme='dark'] .nav-links a.active {
            color: #FFFFFF !important;
            background: var(--primary) !important;
            box-shadow: 0 0 20px rgba(0, 78, 140, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.3) !important;
        }

        [data-theme='dark'] .section-title,
        [data-theme='dark'] .name,
        [data-theme='dark'] .article-title,
        [data-theme='dark'] .header-title,
        [data-theme='dark'] .episode-title,
        [data-theme='dark'] .card-title,
        [data-theme='dark'] .wechat-id,
        [data-theme='dark'] .header h1,
        [data-theme='dark'] .modal-content h2 {
            color: #FFFFFF !important;
            font-weight: 700 !important;
            text-shadow: 0 0 10px rgba(0, 78, 140, 0.3);
        }

        [data-theme='dark'] .tag,
        [data-theme='dark'] .filter-btn,
        [data-theme='dark'] .article-tag,
        [data-theme='dark'] .card-tag {
            color: var(--ink-soft) !important;
            border: 1px solid var(--line) !important;
            background: rgba(0, 78, 140, 0.1) !important;
        }

        [data-theme='dark'] .tag:hover,
        [data-theme='dark'] .filter-btn:hover,
        [data-theme='dark'] .filter-btn.active,
        [data-theme='dark'] .card-tag:hover {
            background: var(--primary) !important;
            color: #FFFFFF !important;
            box-shadow: 0 0 15px rgba(0, 78, 140, 0.4) !important;
        }

        [data-theme='dark'] blockquote {
            color: var(--ink-soft) !important;
            border-left: 4px solid var(--gold) !important;
            background: rgba(0, 78, 140, 0.1) !important;
            padding: 12px 20px !important;
        }

        [data-theme='dark'] strong,
        [data-theme='dark'] .article-content strong,
        [data-theme='dark'] .description strong {
            color: #c5b358 !important;
            text-shadow: 0 0 5px rgba(197, 179, 88, 0.2) !important;
            font-weight: 700 !important;
        }

        [data-theme='dark'] .footer {
            border-top: 1px solid var(--line) !important;
            color: var(--ink-soft) !important;
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>

    <div class="container">

                        </a>

                </div>
            </div>
        </div>

    <div class="footer">
        <div class="footer-links">
            <span class="link-label">友情链接</span>

        <p>© All Rights Reserved.</p>
    </div>

    <script src="js/umami-config.js"></script>

</body>

</html>
