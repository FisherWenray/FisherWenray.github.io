<head>

    <meta property="og:description" content="文鳐夜飞的专题书籍《行思无界》，分享关于一人公司、投资悟道与自我成长的深刻思考。">

    <style>
        :root {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #2A3645;
            --ink: #253038;
            --ink-soft: #606b76;
            --paper: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.87);
            --line: rgba(0, 78, 140, 0.22);
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 20px 44px rgba(28, 39, 50, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: var(--font-sans);
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 620px at 88% 6%, rgba(var(--primary-rgb), 0.22), transparent 62%),
                radial-gradient(980px 560px at 8% 92%, rgba(42, 54, 69, 0.12), transparent 60%),
                linear-gradient(180deg, #f8fafc 0%, var(--paper) 56%, #eef2f6 100%);
            scrollbar-gutter: stable;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -8%;
            pointer-events: none;
            background:
                radial-gradient(620px 300px at 22% 12%, rgba(var(--primary-rgb), 0.14), transparent 70%),
                radial-gradient(760px 380px at 78% 88%, rgba(var(--primary-rgb), 0.1), transparent 72%);
            filter: blur(26px);
            opacity: 0.9;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(18, 26, 34, 0.06) 0.5px, transparent 0.7px),
                radial-gradient(circle at 74% 68%, rgba(255, 255, 255, 0.26) 0.45px, transparent 0.7px);
            background-size: 3px 3px, 4px 4px;
            opacity: 0.1;
            z-index: -1;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 120;
            background: rgba(244, 246, 248, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .theme-toggle {
            background: rgba(var(--primary-rgb), 0.08);
            border: 1px solid var(--line);
            color: var(--primary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: #fff;
            transform: rotate(30deg);
        }

        [data-theme='dark'] .theme-toggle {
            color: var(--gold);
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-links {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 10px;
            flex-wrap: wrap;
            padding: 14px 0;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 0;
            width: 80px;
            text-align: center;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
            border-color: rgba(var(--primary-rgb), 0.36);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .container {
            width: min(1200px, 94vw);
            margin: 28px auto 34px;
        }

        .header {
            padding: clamp(26px, 4vw, 44px);
            min-height: 400px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            width: 100%;
        }

        .header-title {
            font-family: var(--font-serif);
            font-size: clamp(32px, 4.4vw, 52px);
            color: var(--primary);
            margin: 0;
            letter-spacing: 0.8px;
        }

        .header-mark {
            flex-shrink: 0;
            font-size: clamp(42px, 4.2vw, 58px);
            line-height: 1;
        }

        .header-subtitle {
            color: var(--ink-soft);
            font-size: clamp(18px, 2.2vw, 24px);
            line-height: 1.8;
            font-weight: 600;
        }

        .coming-soon {
            margin-top: 30px;
            padding: 12px 30px;
            border-radius: 999px;
            background: rgba(var(--primary-rgb), 0.08);
            border: 1px solid var(--line);
            color: var(--primary);
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.1em;
        }

        .footer {
            width: min(1200px, 94vw);
            margin: 40px auto 34px;
            text-align: center;
            color: #8b97a2;
            font-size: 13px;
            border-top: 1px solid var(--line);
            padding-top: 30px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .footer-links .link-label {
            color: var(--primary);
            font-weight: 700;
            margin-right: 4px;
        }

        @media (max-width: 760px) {
            .header {
                min-height: 300px;
            }

            .nav-links {
                justify-content: flex-start;
            }
        }

        /* --- Deep Sea Glass Dark Theme --- */
        [data-theme='dark'] {
            --primary: #004E8C;
            --primary-rgb: 0, 78, 140;
            --deep: #000814;
            --gold: #c5b358;
            --ink: #FFFFFF;
            --ink-soft: #A0B3C6;
            --paper: #000814;
            --surface: rgba(0, 78, 140, 0.08);
            --line: rgba(0, 78, 140, 0.4);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        [data-theme='dark'] body {
            background: 
                radial-gradient(circle at 50% -20%, rgba(0, 78, 140, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 78, 140, 0.1) 0%, transparent 50%),
                var(--paper) !important;
            color: var(--ink) !important;
            position: relative;
        }

        [data-theme='dark'] .top-nav {
            background: rgba(0, 8, 20, 0.8) !important;
            backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid var(--line);
        }

        [data-theme='dark'] .header {
            background: var(--surface) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid var(--line) !important;
            box-shadow: var(--shadow) !important;
        }

        [data-theme='dark'] .nav-links a {
            color: var(--ink-soft);
        }

        [data-theme='dark'] .nav-links a:hover,
        [data-theme='dark'] .nav-links a.active {
            color: #FFFFFF !important;
            background: var(--primary) !important;
            box-shadow: 0 0 20px rgba(0, 78, 140, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.3) !important;
        }

        [data-theme='dark'] .header-title {
            color: #FFFFFF !important;
            font-weight: 700 !important;
            text-shadow: 0 0 10px rgba(0, 78, 140, 0.3);
        }

        [data-theme='dark'] .coming-soon {
            background: rgba(0, 78, 140, 0.2) !important;
            color: #75B8EE !important;
            border-color: var(--line) !important;
        }

        [data-theme='dark'] .footer {
            border-top: 1px solid var(--line) !important;
            color: var(--ink-soft) !important;
        }
            /* --- Mobile Menu --- */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--ink);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            margin-left: 10px;
        }
        @media (max-width: 680px) {
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: rgba(var(--primary-rgb), 0.08);
                border: 1px solid var(--line);
                color: var(--primary);
                transition: all 0.3s ease;
            }
            [data-theme='dark'] .mobile-menu-btn {
                color: var(--gold);
                border-color: var(--line);
                background: rgba(255, 255, 255, 0.05);
            }
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(244, 246, 248, 0.95);
                backdrop-filter: blur(14px);
                flex-direction: column;
                padding: 10px 0;
                border-bottom: 1px solid var(--line);
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            }
            [data-theme='dark'] .nav-links {
                background: rgba(0, 8, 20, 0.95);
            }
            .nav-links.active {
                display: flex;
            }
            .nav-links a {
                width: 100%;
                border-radius: 0;
                padding: 15px 0;
            }
            .nav-container {
                position: relative;
            }
        }
    </style>
</head>

    </nav>

    <div class="container">

        <p>© All Rights Reserved.</p>

    <script src="js/umami-config.js"></script>

        function toggleMobileMenu() {
            const navLinks = document.getElementById('navLinks');
            if (navLinks) {
                navLinks.classList.toggle('active');
            }
        }
    </script>
</body>
